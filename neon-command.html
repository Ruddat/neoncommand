<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON COMMAND – Geopolitik</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:#040714;color:#fff;font-family:'Courier New',monospace}
    canvas{display:block}
    #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
    #ui *{pointer-events:auto}
    .hud{position:fixed;top:10px;left:10px;padding:10px 14px;background:rgba(4,7,20,.9);border:1px solid rgba(0,217,255,.25);border-radius:6px;font-size:12px;line-height:1.7;min-width:220px}
    .hud hr{border-color:#00d9ff22;margin:4px 0}
    .notify{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 40px;background:rgba(4,7,20,.95);border:2px solid;border-radius:8px;font-size:18px;text-align:center;z-index:20;pointer-events:auto;min-width:300px}
    .notify h2{margin-bottom:8px}
    .notify .sub{font-size:13px;color:#aaa;margin-bottom:12px}
    .notify button{padding:8px 20px;margin:4px;border:1px solid #00d9ff;background:rgba(0,217,255,.15);color:#00d9ff;border-radius:4px;cursor:pointer;font-family:inherit;font-size:14px}
    .notify button:hover{background:rgba(0,217,255,.3)}
    .notify button.red{border-color:#ff345d;color:#ff345d;background:rgba(255,52,93,.1)}
    .build-bar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;pointer-events:auto}
    .bb{padding:6px 10px;background:rgba(4,7,20,.9);border:1px solid rgba(0,217,255,.2);border-radius:4px;font-size:10px;text-align:center;min-width:80px;cursor:pointer;transition:all .15s}
    .bb:hover{border-color:#00d9ff;background:rgba(0,217,255,.1)}
    .bb.active{border-color:#00d9ff;box-shadow:0 0 10px rgba(0,217,255,.3)}
    .bb .k{font-weight:900;color:#00d9ff;font-size:13px}
    .bb .n{color:#ccc;margin-top:2px}
    .bb .c{color:#ffb000;font-size:9px}
    .log{position:fixed;bottom:60px;left:10px;padding:8px 10px;background:rgba(4,7,20,.85);border:1px solid rgba(0,217,255,.15);border-radius:4px;font-size:11px;max-width:320px;max-height:140px;overflow-y:auto;line-height:1.5}
    .log .g{color:#00ff9d}.log .r{color:#ff345d}.log .y{color:#ffb000}.log .c{color:#00d9ff}.log .p{color:#ff2bd6}
  </style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
  <div id="hud" class="hud"></div>
  <div id="log" class="log"></div>
  <div id="buildbar" class="build-bar"></div>
</div>

<script>
// ====== NEON COMMAND: GEOPOLITIK v1.0 ======
const cv=document.getElementById('gc'),cx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();addEventListener('resize',resize);

// ====== AUDIO (Web Audio API - no files needed) ======
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playBoom(vol=.3){
  initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(150,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30,audioCtx.currentTime+.4);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.5);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.5);
  // noise burst
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.2,audioCtx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5);
  const n=audioCtx.createBufferSource(),ng=audioCtx.createGain();
  n.buffer=buf;ng.gain.setValueAtTime(vol*.8,audioCtx.currentTime);ng.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.3);
  n.connect(ng);ng.connect(audioCtx.destination);n.start();
}
function playSiren(){
  initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.setValueAtTime(400,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(900,audioCtx.currentTime+.3);
  o.frequency.linearRampToValueAtTime(400,audioCtx.currentTime+.6);
  g.gain.setValueAtTime(.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.8);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.8);
}
function playAlert(){
  initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='square';o.frequency.setValueAtTime(880,audioCtx.currentTime);
  g.gain.setValueAtTime(.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.15);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.15);
}
function playBuild(){
  initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.setValueAtTime(300,audioCtx.currentTime);o.frequency.linearRampToValueAtTime(600,audioCtx.currentTime+.1);
  g.gain.setValueAtTime(.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.15);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.15);
}

// ====== COUNTRIES ======
const NATIONS={
  usa:{name:'USA',flag:'🇺🇸',color:'#3b82f6',mil:9,eco:8,tech:9,money:500,desc:'Militärmacht Nr.1, High-Tech'},
  eu:{name:'Europa',flag:'🇪🇺',color:'#fbbf24',mil:6,eco:9,tech:8,money:450,desc:'Wirtschaftsgigant, Diplomatie'},
  russia:{name:'Russland',flag:'🇷🇺',color:'#ef4444',mil:8,eco:4,tech:5,money:300,desc:'Atomwaffen, rohe Gewalt'},
  china:{name:'China',flag:'🇨🇳',color:'#dc2626',mil:7,eco:8,tech:7,money:480,desc:'Produktion, Cyber-Krieg'},
  ukraine:{name:'Ukraine',flag:'🇺🇦',color:'#22c55e',mil:5,eco:3,tech:5,money:200,desc:'Verteidigungsboni, Widerstand'},
};

// Map positions (simplified world map coordinates)
const MAP_POS={
  usa:{x:.18,y:.35},eu:{x:.47,y:.28},russia:{x:.62,y:.22},china:{x:.72,y:.38},ukraine:{x:.53,y:.30},
};

// ====== BUILDINGS ======
const BLDS={
  factory:{label:'Fabrik',key:'1',cost:60,color:'#fbbf24',desc:'+15$/s Einkommen',type:'eco'},
  milbase:{label:'Militärbasis',key:'2',cost:80,color:'#ef4444',desc:'+3 Militär/Stärke',type:'mil'},
  lab:{label:'Forschungslab',key:'3',cost:70,color:'#3b82f6',desc:'+2 Tech/s',type:'tech'},
  defense:{label:'Abwehrsystem',key:'4',cost:100,color:'#22c55e',desc:'+5 Verteidigung',type:'def'},
  silo:{label:'Raketensilo',key:'5',cost:150,color:'#a855f7',desc:'Gegenangriff möglich',type:'off'},
};

// ====== GAME STATE ======
let G={mode:'menu',nation:null,money:0,income:10,mil:0,tech:0,defense:0,offense:0,
  buildings:[],enemies:[],projectiles:[],particles:[],texts:[],
  wave:0,waveTimer:0,waveBudget:0,threats:[],
  shake:0,flash:0,flashColor:'',
  turn:0,turnTimer:0,turnLength:12,
  selected:'factory',
  log:[],
  attackScene:null,sceneTimer:0,
  hostility:{usa:0,eu:0,russia:0,china:0,ukraine:0},
  allies:[],
  diplomacyOpen:false,
  lastT:0,
  enemyNations:[],
};

// ====== PARTICLES ======
function burst(x,y,c,n=12,p=1){for(let i=0;i<n;i++){const a=rnd(0,7),s=rnd(50,280)*p;G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(.3,.9),max:1,color:c,size:rnd(2,5)*p})}}
function floatText(x,y,t,c='#fff'){G.texts.push({x,y,text:t,color:c,life:1.5,max:1.5})}
function rnd(a,b){return a+Math.random()*(b-a)}

// ====== LOG ======
function addLog(msg,cls='c'){G.log.push({msg,cls});if(G.log.length>30)G.log.shift();renderLog()}
function renderLog(){const el=document.getElementById('log');el.innerHTML=G.log.slice(-8).map(l=>`<span class="${l.cls}">${l.msg}</span>`).join('<br>');el.scrollTop=el.scrollHeight}

// ====== COUNTRY SELECTION ======
function drawCountrySelect(){
  cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.fillStyle='#00d9ff';cx.font='900 64px Arial';cx.fillText('NEON COMMAND',W/2,H*.1);
  cx.fillStyle='#ff2bd6';cx.font='900 32px Arial';cx.fillText('GEOPOLITIK',W/2,H*.1+45);
  cx.fillStyle='#aaa';cx.font='14px Arial';cx.fillText('Wähle deine Nation',W/2,H*.1+75);

  const keys=Object.keys(NATIONS);
  const cardW=160,cardH=180,gap=16;
  const totalW=keys.length*cardW+(keys.length-1)*gap;
  const startX=(W-totalW)/2;
  const startY=H*.25;

  keys.forEach((k,i)=>{
    const n=NATIONS[k];const x=startX+i*(cardW+gap);
    const hover=G.mouseX>x&&G.mouseX<x+cardW&&G.mouseY>startY&&G.mouseY<startY+cardH;
    cx.fillStyle=hover?'rgba(0,217,255,.12)':'rgba(20,20,40,.85)';
    cx.fillRect(x,startY,cardW,cardH);
    cx.strokeStyle=hover?n.color:'rgba(255,255,255,.15)';cx.lineWidth=hover?2:1;
    cx.strokeRect(x,startY,cardW,cardH);
    cx.fillStyle=n.color;cx.font='40px Arial';cx.fillText(n.flag,x+cardW/2,startY+45);
    cx.fillStyle='#fff';cx.font='900 16px Arial';cx.fillText(n.name,x+cardW/2,startY+75);
    cx.fillStyle='#aaa';cx.font='10px Arial';
    cx.fillText(`Militär ${'█'.repeat(n.mil)}${'░'.repeat(10-n.mil)}`,x+cardW/2,startY+100);
    cx.fillText(`Wirtschaft ${'█'.repeat(n.eco)}${'░'.repeat(10-n.eco)}`,x+cardW/2,startY+115);
    cx.fillText(`Tech ${'█'.repeat(n.tech)}${'░'.repeat(10-n.tech)}`,x+cardW/2,startY+130);
    cx.fillStyle='#888';cx.font='9px Arial';
    // Wrap description
    const words=n.desc.split(' ');let line='';
    let ly=startY+155;
    for(const w of words){if((line+' '+w).length>22){cx.fillText(line.trim(),x+cardW/2,ly);ly+=12;line=w}else{line+=' '+w}}
    if(line)cx.fillText(line.trim(),x+cardW/2,ly);
  });

  cx.fillStyle='#555';cx.font='12px Arial';cx.fillText('Klick auf eine Nation zum Starten',W/2,H-40);
  cx.textAlign='left';
}

function handleClick_CountrySelect(mx,my){
  const keys=Object.keys(NATIONS);
  const cardW=160,cardH=180,gap=16;
  const totalW=keys.length*cardW+(keys.length-1)*gap;
  const startX=(W-totalW)/2;const startY=H*.25;
  keys.forEach((k,i)=>{
    const x=startX+i*(cardW+gap);
    if(mx>x&&mx<x+cardW&&my>startY&&my<startY+cardH){
      selectNation(k);
    }
  });
}

function selectNation(key){
  const n=NATIONS[key];
  G.nation=key;G.money=n.money;
  G.mil=n.mil*2;G.income=10+n.eco*2;
  G.defense=n.mil;G.offense=0;G.tech=0;
  G.mode='playing';G.wave=0;G.turn=0;G.turnTimer=0;
  // Set initial hostility
  Object.keys(NATIONS).forEach(k=>{if(k!==key)G.hostility[k]=10+rnd(0,20)});
  // Enemy nations
  G.enemyNations=Object.keys(NATIONS).filter(k=>k!==key);
  // Allies based on proximity
  if(key==='usa')G.allies=['eu','ukraine'];
  else if(key==='eu')G.allies=['usa','ukraine'];
  else if(key==='ukraine')G.allies=['eu','usa'];
  else if(key==='russia')G.allies=['china'];
  else if(key==='china')G.allies=['russia'];
  G.allies.forEach(a=>G.hostility[a]=Math.max(0,G.hostility[a]-15));

  addLog(`${n.flag} ${n.name} gewählt!`,'g');
  addLog(`Militär: ${n.mil} | Wirtschaft: ${n.eco} | Tech: ${n.tech}`,'c');
  addLog('Baue deine Nation auf und verteidige dich!','y');
  playBuild();
}

// ====== WORLD MAP DRAWING ======
function drawWorldMap(){
  // Background gradient
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#040714');g.addColorStop(1,'#020308');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);

  // Grid
  cx.strokeStyle='rgba(0,217,255,.04)';cx.lineWidth=1;
  for(let x=0;x<W;x+=60){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke()}
  for(let y=0;y<H;y+=60){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke()}

  // Draw simplified continents
  cx.save();
  // North America
  drawContinent(.12,.2,.16,.25,'#1a2744');
  // South America
  drawContinent(.18,.5,.1,.25,'#1a2744');
  // Europe
  drawContinent(.43,.18,.08,.18,'#1a2744');
  // Africa
  drawContinent(.44,.42,.1,.25,'#1a2744');
  // Russia/Central Asia
  drawContinent(.5,.12,.25,.2,'#1a2744');
  // China/East Asia
  drawContinent(.65,.25,.12,.22,'#1a2744');
  // Middle East
  drawContinent(.52,.35,.08,.1,'#1a2744');
  cx.restore();

  // Draw nation markers
  for(const[k,pos]of Object.entries(MAP_POS)){
    const px=pos.x*W,py=pos.y*H;
    const n=NATIONS[k];const isPlayer=k===G.nation;
    const hostility=G.hostility[k]||0;

    // Territory glow
    const radius=isPlayer?50:hostility>50?35:hostility>30?28:22;
    cx.save();
    const glow=cx.createRadialGradient(px,py,0,px,py,radius);
    if(isPlayer){
      glow.addColorStop(0,n.color+'55');glow.addColorStop(1,n.color+'00');
    }else if(hostility>60){
      glow.addColorStop(0,'#ff345d44');glow.addColorStop(1,'#ff345d00');
    }else if(G.allies.includes(k)){
      glow.addColorStop(0,'#00ff9d33');glow.addColorStop(1,'#00ff9d00');
    }else{
      glow.addColorStop(0,'#ffffff11');glow.addColorStop(1,'#ffffff00');
    }
    cx.fillStyle=glow;cx.beginPath();cx.arc(px,py,radius,0,7);cx.fill();
    cx.restore();

    // Nation dot
    cx.save();cx.shadowColor=n.color;cx.shadowBlur=isPlayer?20:10;
    cx.fillStyle=isPlayer?n.color:hostility>60?'#ff345d':G.allies.includes(k)?'#00ff9d':'#666';
    cx.beginPath();cx.arc(px,py,isPlayer?10:7,0,7);cx.fill();cx.restore();

    // Flag + name
    cx.textAlign='center';cx.font=isPlayer?'bold 14px Arial':'11px Arial';
    cx.fillStyle=isPlayer?n.color:'#aaa';
    cx.fillText(`${n.flag} ${n.name}`,px,py-18);

    // Hostility bar
    if(!isPlayer){
      const bw=40,bh=4,bx=px-bw/2,by=py+16;
      cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(bx,by,bw,bh);
      const hColor=hostility>60?'#ff345d':hostility>30?'#ffb000':'#00ff9d';
      cx.fillStyle=hColor;cx.fillRect(bx,by,bw*Math.min(1,hostility/100),bh);
      cx.fillStyle='#666';cx.font='8px Arial';
      cx.fillText(G.allies.includes(k)?'VERBÜNDET':hostility>60?'FEINDLICH':hostility>30?'SPANNUNG':'NEUTRAL',px,py+28);
    }
    cx.textAlign='left';
  }

  // Draw connection lines for threats
  if(G.nation){
    const myPos=MAP_POS[G.nation];
    const mx=myPos.x*W,my=myPos.y*H;
    for(const k of G.enemyNations){
      const h=G.hostility[k];
      if(h>40){
        const tp=MAP_POS[k];const tx=tp.x*W,ty=tp.y*H;
        cx.save();cx.strokeStyle=h>70?'rgba(255,52,93,.3)':'rgba(255,176,0,.15)';
        cx.lineWidth=h>70?2:1;cx.setLineDash([8,8]);
        cx.beginPath();cx.moveTo(mx,my);cx.lineTo(tx,ty);cx.stroke();
        cx.setLineDash([]);cx.restore();
      }
    }
  }

  // Attack indicators
  for(const t of G.threats){
    const from=MAP_POS[t.from],to=MAP_POS[G.nation];
    const fx=from.x*W,fy=from.y*H,tx=to.x*W,ty=to.y*H;
    const progress=Math.min(1,t.timer/t.duration);
    const px=fx+(tx-fx)*progress,py=fy+(ty-py)*progress;
    cx.save();cx.shadowColor='#ff345d';cx.shadowBlur=15;cx.fillStyle='#ff345d';
    cx.beginPath();cx.arc(px,py,6+Math.sin(Date.now()*.01)*3,0,7);cx.fill();
    // Trail
    cx.strokeStyle='rgba(255,52,93,.4)';cx.lineWidth=2;cx.beginPath();cx.moveTo(fx,fy);cx.lineTo(px,py);cx.stroke();
    cx.restore();
  }
}

function drawContinent(x,y,w,h,color){
  cx.fillStyle=color;
  cx.beginPath();
  // Irregular shape
  cx.moveTo(W*x,H*y);
  cx.quadraticCurveTo(W*(x+w*.3),H*(y-h*.1),W*(x+w),H*(y+h*.2));
  cx.quadraticCurveTo(W*(x+w*1.1),H*(y+h*.6),W*(x+w*.7),H*(y+h));
  cx.quadraticCurveTo(W*(x+w*.3),H*(y+h*1.05),W*x,H*(y+h*.7));
  cx.quadraticCurveTo(W*(x-w*.05),H*(y+h*.3),W*x,H*y);
  cx.fill();
  cx.strokeStyle='rgba(0,217,255,.06)';cx.lineWidth=1;cx.stroke();
}

// ====== ATTACK SCENE (Cinematic Battle) ======
function drawAttackScene(){
  // Red flashing overlay
  if(G.flash>0){
    cx.fillStyle=G.flashColor+'33';cx.fillRect(0,0,W,H);
  }

  const scene=G.attackScene;
  if(!scene)return;

  // Dramatic background
  cx.fillStyle='rgba(0,0,0,.4)';cx.fillRect(0,0,W,H);

  // Incoming missiles
  for(const m of scene.missiles||[]){
    cx.save();cx.shadowColor='#ff345d';cx.shadowBlur=15;
    // Missile body
    cx.fillStyle='#ff345d';
    const angle=Math.atan2(m.vy,m.vx);
    cx.translate(m.x,m.y);cx.rotate(angle);
    cx.fillRect(-12,-3,24,6);
    cx.fillStyle='#ffb000';cx.fillRect(12,-2,6,4);
    // Trail
    cx.restore();
    cx.save();cx.strokeStyle='rgba(255,176,0,.3)';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(m.x,m.y);
    cx.lineTo(m.x-m.vx*.08,m.y-m.vy*.08);cx.stroke();cx.restore();
  }

  // Explosions
  for(const e of scene.explosions||[]){
    const a=e.life/e.max;
    cx.save();
    const g=cx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.size*a);
    g.addColorStop(0,'rgba(255,200,50,'+a+')');
    g.addColorStop(.4,'rgba(255,100,30,'+(a*.6)+')');
    g.addColorStop(1,'rgba(255,50,50,0)');
    cx.fillStyle=g;cx.beginPath();cx.arc(e.x,e.y,e.size*a,0,7);cx.fill();
    cx.restore();
  }
}

// ====== GAME LOGIC ======
function updateGame(dt){
  if(G.mode!=='playing')return;

  G.turnTimer+=dt;

  // Income
  const genCount=G.buildings.filter(b=>b.type==='factory').length;
  G.income=10+NATIONS[G.nation].eco*2+genCount*15;
  G.money+=G.income*dt;

  // Tech
  const labCount=G.buildings.filter(b=>b.type==='lab').length;
  G.tech+=labCount*2*dt;

  // Military growth
  const milCount=G.buildings.filter(b=>b.type==='milbase').length;
  G.mil+=(0.5+milCount*0.5)*dt;

  // Defense
  const defCount=G.buildings.filter(b=>b.type==='defense').length;
  G.defense=NATIONS[G.nation].mil+defCount*5;

  // Offense
  const siloCount=G.buildings.filter(b=>b.type==='silo').length;
  G.offense=siloCount*15;

  // Hostility increases over time
  for(const k of G.enemyNations){
    const baseInc=G.allies.includes(k)?0.3:0.8;
    G.hostility[k]=Math.min(100,G.hostility[k]+baseInc*dt);
  }

  // Wave system
  G.waveTimer+=dt;
  if(G.waveTimer>G.turnLength){
    G.waveTimer=0;G.turn++;
    processTurn();
  }

  // Threats moving
  for(let i=G.threats.length-1;i>=0;i--){
    const t=G.threats[i];t.timer+=dt;
    if(t.timer>=t.duration){
      // Attack hits!
      executeAttack(t);
      G.threats.splice(i,1);
    }
  }

  // Attack scene
  if(G.attackScene){
    G.sceneTimer-=dt;
    // Move missiles
    for(const m of G.attackScene.missiles||[]){
      m.x+=m.vx*dt;m.y+=m.vy*dt;
    }
    // Update explosions
    for(let i=(G.attackScene.explosions||[]).length-1;i>=0;i--){
      G.attackScene.explosions[i].life-=dt;
      if(G.attackScene.explosions[i].life<=0)G.attackScene.explosions.splice(i,1);
    }
    if(G.sceneTimer<=0){G.attackScene=null}
  }

  // Particles
  for(let i=G.particles.length-1;i>=0;i--){
    const p=G.particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.97;p.vy*=.97;p.life-=dt;
    if(p.life<=0)G.particles.splice(i,1);
  }
  for(let i=G.texts.length-1;i>=0;i--){
    G.texts[i].y-=35*dt;G.texts[i].life-=dt;
    if(G.texts[i].life<=0)G.texts.splice(i,1);
  }

  // Shake & flash decay
  G.shake=Math.max(0,G.shake-25*dt);
  G.flash=Math.max(0,G.flash-2*dt);

  // Check game over
  if(G.money<-100){
    G.mode='gameover';
    addLog('💥 Nation zusammengebrochen!','r');
  }
}

function processTurn(){
  addLog(`── Runde ${G.turn} ──`,'c');

  // Random events
  const eventRoll=Math.random();
  if(eventRoll<.15){
    // Trade deal
    const ally=G.allies[Math.floor(Math.random()*G.allies.length)];
    if(ally){
      const bonus=Math.floor(50+G.tech*2);
      G.money+=bonus;
      addLog(`${NATIONS[ally].flag} Handelsabkommen: +${bonus}$`,'g');
      playBuild();
    }
  }else if(eventRoll<.25){
    // Tech breakthrough
    if(G.tech>10){
      const bonus=Math.floor(G.tech*5);
      G.money+=bonus;G.defense+=2;
      addLog(`🔬 Technologie-Durchbruch: +${bonus}$ +2 Verteidigung`,'c');
    }
  }

  // Check for attacks
  for(const k of G.enemyNations){
    const h=G.hostility[k];
    if(h>60&&Math.random()<h/200){
      launchAttack(k);
    }
    if(h>80&&Math.random()<.3){
      launchAttack(k);
    }
  }

  // Reduce hostility slightly for allies
  G.allies.forEach(a=>{G.hostility[a]=Math.max(0,G.hostility[a]-1)});
}

function launchAttack(fromKey){
  const from=NATIONS[fromKey];
  const strength=Math.floor(from.mil*(1+G.turn*.05)+rnd(5,15));

  // Create threat on map
  G.threats.push({
    from:fromKey,to:G.nation,
    strength,timer:0,
    duration:3+Math.random()*2,
  });

  addLog(`${from.flag} ${from.name} greift an! Stärke: ${strength}`,'r');
  playSiren();
  G.shake=8;
  G.flash=1;G.flashColor='#ff345d';

  // Start attack scene
  startAttackScene(fromKey,strength);
}

function startAttackScene(fromKey,strength){
  const from=MAP_POS[fromKey],to=MAP_POS[G.nation];
  const fx=from.x*W,fy=from.y*H,tx=to.x*W,ty=to.y*H;
  const angle=Math.atan2(ty-fy,tx-fx);
  const speed=200;

  const missiles=[];
  const count=Math.min(8,Math.floor(strength/10)+1);
  for(let i=0;i<count;i++){
    const delay=i*.3;
    missiles.push({
      x:fx+rnd(-20,20),y:fy+rnd(-20,20),
      vx:Math.cos(angle)*speed+rnd(-20,20),
      vy:Math.sin(angle)*speed+rnd(-20,20),
      delay,
      active:false,
    });
  }

  G.attackScene={missiles,explosions:[]};
  G.sceneTimer=4;

  // Schedule explosions
  const timeToTarget=Math.hypot(tx-fx,ty-fy)/speed;
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(G.attackScene){
        const ex=tx+rnd(-60,60),ey=ty+rnd(-60,60);
        G.attackScene.explosions.push({x:ex,y:ey,life:1,max:1,size:rnd(30,80)});
        burst(ex,ey,'#ff345d',15,1.5);
        burst(ex,ey,'#ffb000',10);
        playBoom(.4);
        G.shake=Math.max(G.shake,12);
        G.flash=.8;G.flashColor='#ff345d';
      }
    },(timeToTarget+i*.3)*1000);
  }

  // Resolve attack after scene
  setTimeout(()=>{
    resolveAttack(fromKey,strength);
  },(timeToTarget+count*.3+.5)*1000);
}

function resolveAttack(fromKey,strength){
  const from=NATIONS[fromKey];
  const defPower=G.defense;
  const damage=Math.max(0,strength-defPower*1.5);

  if(damage>0){
    const moneyLoss=Math.floor(damage*8);
    const milLoss=Math.floor(damage*.3);
    G.money-=moneyLoss;
    G.mil=Math.max(0,G.mil-milLoss);
    addLog(`💥 ${from.flag} Angriff erleidet! -${moneyLoss}$ -${milLoss} Mil`,'r');

    // Destroy random buildings
    if(damage>20&&G.buildings.length>0){
      const idx=Math.floor(Math.random()*G.buildings.length);
      const b=G.buildings[idx];
      addLog(`🏚️ ${BLDS[b.type].label} zerstört!`,'r');
      G.buildings.splice(idx,1);
    }

    G.shake=15;G.flash=1;G.flashColor='#ff345d';
    playBoom(.6);
  }else{
    addLog(`🛡️ ${from.flag} Angriff abgewehrt! Verteidigung hält.`,'g');
    G.hostility[fromKey]=Math.max(0,G.hostility[fromKey]-5);
    playBuild();
  }

  // Counter-attack with silos
  if(G.offense>0&&damage>0){
    const counter=Math.floor(G.offense*.8);
    G.hostility[fromKey]=Math.max(0,G.hostility[fromKey]-counter*.3);
    addLog(`🚀 Gegenangriff! -${counter} Feindstärke`,'p');
    burst(W*.5,H*.5,'#a855f7',30,2);
    playBoom(.3);
  }
}

  // Already handled by setTimeout in startAttackScene
}

// ====== BUILDING ======
function canBuild(type){
  const spec=BLDS[type];
  return spec&&G.money>=spec.cost;
}

function build(type){
  if(!canBuild(type))return;
  const spec=BLDS[type];G.money-=spec.cost;
  G.buildings.push({type,level:1});
  addLog(`🏗️ ${spec.label} gebaut! (-${spec.cost}$)`,'g');
  playBuild();

  // Building effects
  if(type==='milbase')G.mil+=3;
  if(type==='defense')G.defense+=5;
  if(type==='silo'){G.offense+=15;addLog('🚀 Raketen bereit für Gegenangriffe!','p')}
}

function counterAttack(targetKey){
  if(G.offense<=0){addLog('Kein Raketensilo vorhanden!','r');return}
  const target=NATIONS[targetKey];
  G.hostility[targetKey]=Math.max(0,G.hostility[targetKey]-15);

  // Launch visual
  const from=MAP_POS[G.nation],to=MAP_POS[targetKey];
  burst(from.x*W,from.y*H,'#a855f7',25,1.5);
  burst(to.x*W,to.y*H,'#ff345d',30,1.5);
  G.shake=10;G.flash=.6;G.flashColor='#a855f7';
  playBoom(.5);

  addLog(`🚀 Gegenangriff auf ${target.flag} ${target.name}!`,'p');
  floatText(to.x*W,to.y*H-30,`-${G.offense}`,NATIONS[G.nation].color);
}

// ====== DRAW HUD ======
function drawHUD(){
  const el=document.getElementById('hud');
  if(G.mode==='menu'){el.innerHTML='<b style="color:#00d9ff">NEON COMMAND</b><br>Geopolitik';return}
  const n=NATIONS[G.nation];
  const nextTurn=Math.max(0,Math.ceil(G.turnLength-G.waveTimer));
  el.innerHTML=`
    <div style="font-size:13px;font-weight:900;color:${n.color}">${n.flag} ${n.name}</div>
    <div>Geld <b style="color:#ffb000">${Math.floor(G.money)}$</b> <span style="color:#888">(+${G.income}/s)</span></div>
    <div>Militär <b style="color:#ef4444">${Math.floor(G.mil)}</b> · Verteidigung <b style="color:#22c55e">${Math.floor(G.defense)}</b></div>
    <div>Tech <b style="color:#3b82f6">${Math.floor(G.tech)}</b> · Raketen <b style="color:#a855f7">${Math.floor(G.offense)}</b></div>
    <hr>
    <div>Runde <b>${G.turn}</b> · Nächste Aktion in <b style="color:#00d9ff">${nextTurn}s</b></div>
    <div style="font-size:10px;color:#888">Gebäude: ${G.buildings.length} | [K] Gegenangriff</div>
  `;
}

function drawBuildBar(){
  const el=document.getElementById('buildbar');
  if(G.mode!=='playing'){el.innerHTML='';return}
  let html='';
  for(const[k,s]of Object.entries(BLDS)){
    const active=G.selected===k;
    const afford=G.money>=s.cost;
    html+=`<div class="bb${active?' active':''}" style="opacity:${afford?1:.4}" onclick="selectBuild('${k}')">
      <div class="k">${s.key}</div><div class="n" style="color:${s.color}">${s.label}</div><div class="c">${s.cost}$</div>
    </div>`;
  }
  html+=`<div class="bb" onclick="openDiplomacy()" style="border-color:#ff2bd6"><div class="k" style="color:#ff2bd6">D</div><div class="n" style="color:#ff2bd6">Diplomatie</div><div class="c">20$</div></div>`;
  html+=`<div class="bb" onclick="doCounter()" style="border-color:#a855f7"><div class="k" style="color:#a855f7">K</div><div class="n" style="color:#a855f7">Angriff</div><div class="c">Raketen</div></div>`;
  el.innerHTML=html;
}

// Global click handlers
window.selectBuild=function(k){G.selected=k;playAlert()};
window.openDiplomacy=function(){
  if(G.money<20){addLog('Nicht genug Geld für Diplomatie!','r');return}
  G.money-=20;
  // Reduce hostility with random nation
  const neutral=G.enemyNations.filter(k=>!G.allies.includes(k)&&G.hostility[k]>10);
  if(neutral.length>0){
    const target=neutral[Math.floor(Math.random()*neutral.length)];
    G.hostility[target]=Math.max(0,G.hostility[target]-15);
    addLog(`🤝 Diplomatie: ${NATIONS[target].flag} Beziehungen verbessert!`,'g');
    playBuild();
  }else{
    addLog('🤝 Alle Nationen bereits freundlich!','c');
  }
};
window.doCounter=function(){
  // Find most hostile nation
  let maxH=0,target=null;
  for(const k of G.enemyNations){if(G.hostility[k]>maxH){maxH=G.hostility[k];target=k}}
  if(target)counterAttack(target);
  else addLog('Keine feindlichen Nationen!','c');
};

// ====== GAME OVER ======
function drawGameOver(){
  cx.fillStyle='rgba(0,0,0,.8)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.fillStyle='#ff345d';cx.font='900 56px Arial';cx.fillText('NATION GEFALLEN',W/2,H/2-40);
  cx.fillStyle='#fff';cx.font='20px Arial';
  cx.fillText(`${NATIONS[G.nation].flag} ${NATIONS[G.nation].name} – Runde ${G.turn}`,W/2,H/2+10);
  cx.fillStyle='#aaa';cx.font='16px Arial';cx.fillText('R = Neustart',W/2,H/2+50);
  cx.textAlign='left';
}

// ====== MAIN DRAW ======
function draw(){
  cx.save();
  if(G.shake>0)cx.translate((Math.random()-.5)*G.shake,(Math.random()-.5)*G.shake);

  if(G.mode==='menu'){
    drawCountrySelect();
  }else if(G.mode==='playing'){
    drawWorldMap();
    drawAttackScene();
    // Particles
    for(const p of G.particles){const a=Math.max(0,p.life/p.max);cx.globalAlpha=a;cx.fillStyle=p.color;cx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)}
    cx.globalAlpha=1;
    // Float texts
    cx.textAlign='center';
    for(const t of G.texts){const a=Math.max(0,t.life/t.max);cx.globalAlpha=a;cx.fillStyle=t.color;cx.font='bold 16px Arial';cx.fillText(t.text,t.x,t.y)}
    cx.globalAlpha=1;cx.textAlign='left';
  }else if(G.mode==='gameover'){
    drawWorldMap();drawGameOver();
  }

  cx.restore();
  drawHUD();drawBuildBar();
}

// ====== INPUT ======
G.mouseX=0;G.mouseY=0;
cv.addEventListener('mousemove',e=>{G.mouseX=e.clientX;G.mouseY=e.clientY});
cv.addEventListener('click',e=>{
  initAudio();
  if(G.mode==='menu'){handleClick_CountrySelect(e.clientX,e.clientY);return}
  if(G.mode==='playing'&&canBuild(G.selected)){build(G.selected)}
});
addEventListener('keydown',e=>{
  initAudio();
  if(e.key==='r'||e.key==='R'){
    G={mode:'menu',nation:null,money:0,income:10,mil:0,tech:0,defense:0,offense:0,
      buildings:[],enemies:[],projectiles:[],particles:[],texts:[],
      wave:0,waveTimer:0,waveBudget:0,threats:[],
      shake:0,flash:0,flashColor:'',turn:0,turnTimer:0,turnLength:12,
      selected:'factory',log:[],attackScene:null,sceneTimer:0,
      hostility:{usa:0,eu:0,russia:0,china:0,ukraine:0},allies:[],
      enemyNations:[],lastT:0,mouseX:0,mouseY:0};
    return;
  }
  if(G.mode!=='playing')return;
  if(e.key==='1')G.selected='factory';
  if(e.key==='2')G.selected='milbase';
  if(e.key==='3')G.selected='lab';
  if(e.key==='4')G.selected='defense';
  if(e.key==='5')G.selected='silo';
  if(e.key==='d'||e.key==='D')window.openDiplomacy();
  if(e.key==='k'||e.key==='K')window.doCounter();
  playAlert();
});

// ====== GAME LOOP ======
function loop(t=0){
  const dt=Math.min(.033,(t-G.lastT)/1000||0);G.lastT=t;
  updateGame(dt);draw();
  requestAnimationFrame(loop);
}
loop();

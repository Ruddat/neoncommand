<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Command</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#app{height:100%;overflow:hidden;background:#050816;color:#fff;font-family:'Courier New',monospace}
    #game{display:block;cursor:crosshair}
    .hud{position:fixed;top:10px;left:10px;padding:10px 14px;background:rgba(4,7,20,0.88);border:1px solid rgba(0,217,255,0.25);border-radius:6px;font-size:12px;line-height:1.6;pointer-events:none;min-width:260px;box-shadow:0 0 24px rgba(0,217,255,0.08)}
    .hud b{font-size:13px}
    .shop{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:none}
    .shop-item{padding:6px 12px;background:rgba(4,7,20,0.9);border:1px solid rgba(0,217,255,0.2);border-radius:4px;font-size:11px;text-align:center;min-width:90px}
    .shop-item.active{border-color:#00d9ff;box-shadow:0 0 12px rgba(0,217,255,0.3)}
    .shop-item .key{font-weight:900;color:#00d9ff;font-size:14px}
    .shop-item .name{font-size:10px;margin-top:2px}
    .shop-item .cost{font-size:10px;color:#ffb000}
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>
    <div id="hud" class="hud"></div>
    <div id="shop" class="shop"></div>
  </div>

<script>
// ====== NEON COMMAND v0.3 – More Fun Edition ======
const TILE=48,VERSION='0.3.0';
const C={bg:'#040714',cyan:'#00d9ff',pink:'#ff2bd6',red:'#ff345d',green:'#00ff9d',yellow:'#ffb000',violet:'#7d5cff',white:'#fff',orange:'#ff6b35'};
function snap(v){return Math.floor(v/TILE)*TILE+TILE/2}
function rnd(a,b){return a+Math.random()*(b-a)}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

// ====== BUILDINGS ======
const BLD={
  laser:{label:'Laser',key:'1',cost:30,range:200,rate:4.5,dmg:16,color:C.pink,desc:'Schneller Turm'},
  missile:{label:'Rakete',key:'2',cost:55,range:260,rate:1.2,dmg:50,color:C.yellow,desc:'Fläschenschaden',splash:90},
  generator:{label:'Generator',key:'3',cost:40,range:0,rate:0,dmg:0,color:C.green,desc:'+5E/s Einkommen'},
  shield:{label:'Schild',key:'4',cost:65,range:0,rate:0,dmg:0,color:C.violet,desc:'Heilt Kern +8/s',hp:220,heal:8},
  sniper:{label:'Sniper',key:'5',cost:80,range:400,rate:0.8,dmg:100,color:C.cyan,desc:'Riesige Reichweite'},
};

// ====== UPGRADES (spend Data) ======
const UPGRADES=[
  {id:'dmg',label:'Schaden +20%',cost:40,icon:'⚔️',apply:s=>{s.upgDmg*=1.2}},
  {id:'rate',label:'Feuerrate +25%',cost:50,icon:'🔥',apply:s=>{s.upgRate*=1.25}},
  {id:'range',label:'Reichweite +15%',cost:45,icon:'🎯',apply:s=>{s.upgRange*=1.15}},
  {id:'income',label:'Einkommen +30%',cost:35,icon:'💰',apply:s=>{s.upgIncome*=1.3}},
  {id:'corehp',label:'Kern +50 HP',cost:55,icon:'❤️',apply:s=>{s.core.maxHp+=50;s.core.hp=Math.min(s.core.hp+50,s.core.maxHp)}},
  {id:'genbonus',label:'Generator +3E/s',cost:45,icon:'⚡',apply:s=>{s.upgGen+=3}},
];

// ====== ENEMY TYPES ======
const ENM={
  scout:{hp:35,speed:62,size:9,reward:8,color:C.red,energy:4},
  soldier:{hp:65,speed:44,size:13,reward:12,color:C.orange,energy:6},
  tank:{hp:160,speed:24,size:19,reward:25,color:C.yellow,energy:12},
  runner:{hp:28,speed:110,size:8,reward:10,color:C.green,energy:5},
  boss:{hp:800,speed:18,size:34,reward:250,color:C.pink,energy:60,isBoss:true},
};

// ====== PARTICLES ======
function burst(s,x,y,c,n=12,p=1){for(let i=0;i<n;i++){const a=rnd(0,7),sp=rnd(50,280)*p;s.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(.3,.9),max:1,color:c,size:rnd(2,5)*p})}}
function floatText(s,x,y,t,c=C.white){s.texts.push({x,y,text:t,color:c,life:1.2,max:1.2})}

function updateParticles(s,dt){
  for(let i=s.particles.length-1;i>=0;i--){const p=s.particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.97;p.vy*=.97;p.life-=dt;if(p.life<=0)s.particles.splice(i,1)}
  for(let i=s.texts.length-1;i>=0;i--){const t=s.texts[i];t.y-=40*dt;t.life-=dt;if(t.life<=0)s.texts.splice(i,1)}
}

// ====== RESOURCES ======
function updateResources(s,dt){
  const gens=s.buildings.filter(b=>b.type==='generator').length;
  s.income=8+gens*(5+s.upgGen);
  s.energy+=s.income*s.upgIncome*dt;
  s.data+=(1.5+gens*0.6)*dt;
}

// ====== WAVES ======
function spawnWave(s){
  s.wave++;s.waveTimer=0;
  const boss=s.wave%5===0;
  s.isBossWave=boss;
  s.waveBudget=boss?2+Math.floor(s.wave/5):5+s.wave*2;
  if(boss){s.message=`⚔️ BOSS WELLE ${s.wave}! ⚔️`;burst(s,s.core.x,s.core.y,C.pink,40,1.5);s.shake=12}
  else{s.message=`Welle ${s.wave}`;if(s.wave<=2)s.message+=' – Baue Verteidigung!'}
  s.msgTimer=3;
}

function updateWaves(s,W,H,dt){
  s.waveTimer+=dt;
  // Spawn enemies
  if(s.waveBudget>0){
    const delay=Math.max(.25,1.0-s.wave*.02);
    if(s.waveTimer>delay){spawnOne(s,W,H);s.waveBudget--;s.waveTimer=0}
  }
  // Next wave
  if(s.waveBudget===0&&s.enemies.length===0&&s.waveTimer>3){spawnWave(s)}
}

function spawnOne(s,W,H){
  if(s.isBossWave&&s.waveBudget===2+Math.floor(s.wave/5)){spawnType(s,W,H,'boss');return}
  const w=s.wave,r=Math.random();
  let t;
  if(w<=2)t='scout';
  else if(w<=4)t=r<.55?'scout':r<.85?'soldier':'runner';
  else if(w<=8)t=r<.3?'scout':r<.6?'soldier':r<.8?'runner':'tank';
  else t=r<.15?'scout':r<.4?'soldier':r<.6?'runner':r<.85?'tank':'runner';
  spawnType(s,W,H,t);
}

function spawnType(s,W,H,type){
  const spec=ENM[type];if(!spec)return;
  const side=Math.random();let x,y;
  if(side<.55){x=W+30;y=rnd(H*.1,H*.9)}
  else if(side<.78){x=rnd(W*.3,W);y=-30}
  else{x=rnd(W*.3,W);y=H+30}
  const scale=1+(s.wave-1)*.06; // gentler scaling
  s.enemies.push({x,y,hp:spec.hp*scale,maxHp:spec.hp*scale,speed:spec.speed,size:spec.size,reward:spec.reward,color:spec.color,energy:spec.energy,isBoss:spec.isBoss||false});
}

// ====== COMBAT ======
function updateCombat(s,dt){
  const{buildings:bld,enemies,projectiles:P,core}=s;

  // Shield healing
  for(const b of bld){if(b.type==='shield'&&core.hp<core.maxHp)core.hp=Math.min(core.maxHp,core.hp+(BLD.shield.heal||8)*dt)}

  // Kill streak tracker
  s.killTimer=(s.killTimer||0)-dt;
  if(s.killTimer<=0)s.killStreak=0;

  // Turrets fire
  for(const b of bld){
    if(b.type==='generator'||b.type==='shield')continue;
    const spec=BLD[b.type];if(!spec||spec.range===0)continue;
    b.cooldown-=dt;if(b.cooldown>0)continue;

    const range=spec.range*s.upgRange;
    let target=null,best=range;
    for(const e of enemies){const d=dist(b,e);if(d<best){best=d;target=e}}

    if(target){
      b.cooldown=1/(spec.rate*s.upgRate);
      const angle=Math.atan2(target.y-b.y,target.x-b.x);
      const speed=b.type==='missile'?320:b.type==='sniper'?850:600;
      const dmg=spec.dmg*s.upgDmg;
      P.push({x:b.x,y:b.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,dmg,color:spec.color,type:b.type,life:3,splash:spec.splash||0,trail:[]});
    }
  }

  // Move projectiles
  for(let i=P.length-1;i>=0;i--){
    const p=P[i];
    p.trail.push({x:p.x,y:p.y});if(p.trail.length>6)p.trail.shift();
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0||p.x<-200||p.x>5000||p.y<-200||p.y>5000){P.splice(i,1);continue}
    let hit=false;
    for(const e of enemies){
      const d=Math.hypot(p.x-e.x,p.y-e.y);
      if(d<e.size+8){
        e.hp-=p.dmg;
        floatText(s,e.x,e.y-e.size,`-${Math.floor(p.dmg)}`,p.color);
        burst(s,p.x,p.y,p.color,6);
        // Sniper knockback
        if(p.type==='sniper'){const a=Math.atan2(e.y-p.y,e.x-p.x);e.x+=Math.cos(a)*10;e.y+=Math.sin(a)*10}
        // Splash
        if(p.splash>0){
          for(const o of enemies){if(o===e)continue;const sd=Math.hypot(p.x-o.x,p.y-o.y);if(sd<p.splash){const splashDmg=p.dmg*(1-sd/p.splash)*.6;o.hp-=splashDmg;burst(s,o.x,o.y,p.color,4);floatText(s,o.x,o.y-o.size,`-${Math.floor(splashDmg)}`,C.orange)}}
          burst(s,p.x,p.y,p.color,24,1.3);s.shake=Math.max(s.shake,5);
        }
        hit=true;break;
      }
    }
    if(hit)P.splice(i,1);
  }

  // Move enemies toward core
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const dx=core.x-e.x,dy=core.y-e.y,d=Math.hypot(dx,dy)||1;
    e.x+=(dx/d)*e.speed*dt;e.y+=(dy/d)*e.speed*dt;

    // Damage core
    if(d<TILE*.7){core.hp-=(e.isBoss?18:10)*dt;burst(s,core.x,core.y,C.red,2);s.shake=Math.max(s.shake,3)}

    // Damage buildings
    for(let j=bld.length-1;j>=0;j--){
      const b=bld[j],bd=Math.hypot(e.x-b.x,e.y-b.y);
      const cr=b.type==='shield'?TILE*.7:TILE*.45;
      if(bd<cr){
        b.hp-=(e.isBoss?16:6)*dt;
        if(b.type==='shield'){e.hp-=6*dt;e.speed=Math.max(8,e.speed*.97)}
        if(b.hp<=0){burst(s,b.x,b.y,C.red,30);floatText(s,b.x,b.y-20,'ZERSTÖRT',C.red);bld.splice(j,1)}
      }
    }

    // Enemy died
    if(e.hp<=0){
      s.kills++;s.score+=e.reward;s.energy+=e.energy;
      s.killStreak=(s.killStreak||0)+1;s.killTimer=2;

      // Combo bonus
      if(s.killStreak>=3){
        const bonus=Math.floor(s.killStreak*5);
        s.score+=bonus;s.energy+=bonus*.5;
        floatText(s,e.x,e.y-25,`${s.killStreak}x COMBO! +${bonus}`,C.yellow);
        burst(s,e.x,e.y,C.yellow,16,1.2);
      }else{
        floatText(s,e.x,e.y-25,`+${e.reward}`,C.green);
      }

      burst(s,e.x,e.y,e.color,e.isBoss?50:18,e.isBoss?1.8:1);
      if(e.isBoss){s.shake=15;burst(s,e.x,e.y,C.white,60,2);floatText(s,e.x,e.y-50,'BOSS VERNICHTET!',C.pink)}
      enemies.splice(i,1);
    }
  }
}

// ====== ORBITAL STRIKE ======
function orbitalStrike(s){
  if(s.orbitalCd>0)return;
  s.orbitalCd=20; // 20 second cooldown
  const x=s.mouse.x,y=s.mouse.y;
  s.shake=18;
  burst(s,x,y,C.violet,80,2);burst(s,x,y,C.white,40,1.5);
  // Ring expanding effect
  for(let i=0;i<36;i++){const a=i/36*7;const r=140;s.particles.push({x:x+Math.cos(a)*r,y:y+Math.sin(a)*r,vx:Math.cos(a)*200,vy:Math.sin(a)*200,life:.8,max:.8,color:C.violet,size:4})}
  // Damage
  for(const e of s.enemies){
    const d=Math.hypot(e.x-x,e.y-y);
    if(d<180){const dmg=200*(1-d/200);e.hp-=dmg;floatText(s,e.x,e.y-e.size,`-${Math.floor(dmg)}`,C.violet)}
  }
  floatText(s,x,y-40,'ORBITAL STRIKE!',C.violet);
}

// ====== RENDERER ======
function drawBar(ctx,x,y,w,h,v,c){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(x,y,w,h);ctx.fillStyle=c;ctx.fillRect(x,y,w*Math.max(0,Math.min(1,v)),h)}

function drawBG(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#040714');g.addColorStop(1,'#03040a');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  // Grid
  ctx.strokeStyle='rgba(0,217,255,.06)';ctx.lineWidth=1;
  for(let x=0;x<w;x+=TILE){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
  for(let y=0;y<h;y+=TILE){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
}

function drawCore(ctx,s){
  const{core}=s,pulse=1+Math.sin(Date.now()*.003)*.1;
  // Glow rings
  ctx.save();ctx.shadowColor=C.cyan;ctx.shadowBlur=35+pulse*12;
  ctx.fillStyle=C.cyan;ctx.beginPath();ctx.arc(core.x,core.y,24,0,7);ctx.fill();ctx.restore();
  // Outer pulse ring
  ctx.strokeStyle=C.violet;ctx.lineWidth=2;ctx.globalAlpha=.5;
  ctx.beginPath();ctx.arc(core.x,core.y,32*pulse,0,7);ctx.stroke();ctx.globalAlpha=1;
  // Inner diamond
  ctx.fillStyle=C.white;ctx.beginPath();ctx.moveTo(core.x,core.y-12);ctx.lineTo(core.x+9,core.y);ctx.lineTo(core.x,core.y+12);ctx.lineTo(core.x-9,core.y);ctx.closePath();ctx.fill();
  // HP bar
  drawBar(ctx,core.x-34,core.y+36,68,7,core.hp/core.maxHp,core.hp>core.maxHp*.35?C.green:C.red);
  ctx.fillStyle=C.white;ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.fillText(`${Math.max(0,Math.floor(core.hp))}`,core.x,core.y+43);ctx.textAlign='left';
}

function drawBuildings(ctx,s){
  for(const b of s.buildings){
    const spec=BLD[b.type];if(!spec)continue;
    ctx.save();ctx.shadowColor=spec.color;ctx.shadowBlur=16;ctx.fillStyle=spec.color;
    const range=spec.range*s.upgRange;

    if(b.type==='generator'){
      ctx.beginPath();ctx.moveTo(b.x,b.y-17);ctx.lineTo(b.x+15,b.y);ctx.lineTo(b.x,b.y+17);ctx.lineTo(b.x-15,b.y);ctx.closePath();ctx.fill();
      // Pulse
      ctx.fillStyle='rgba(0,255,157,.25)';const p=1+Math.sin(Date.now()*.004+b.x)*.4;
      ctx.beginPath();ctx.arc(b.x,b.y,7*p,0,7);ctx.fill();
    }else if(b.type==='shield'){
      ctx.globalAlpha=.2;ctx.beginPath();ctx.arc(b.x,b.y,TILE*.75,0,7);ctx.fill();
      ctx.globalAlpha=.7;ctx.strokeStyle=spec.color;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(b.x,b.y,TILE*.75,0,7);ctx.stroke();
      ctx.globalAlpha=1;ctx.fillStyle=C.white;ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.fillText('S',b.x,b.y+5);ctx.textAlign='left';
    }else if(b.type==='sniper'){
      ctx.beginPath();ctx.moveTo(b.x,b.y-17);ctx.lineTo(b.x+15,b.y+11);ctx.lineTo(b.x-15,b.y+11);ctx.closePath();ctx.fill();
      // Scope indicator
      ctx.strokeStyle=spec.color;ctx.globalAlpha=.1;ctx.beginPath();ctx.arc(b.x,b.y,range,0,7);ctx.stroke();ctx.globalAlpha=1;
    }else if(b.type==='missile'){
      ctx.fillRect(b.x-10,b.y-10,20,20);
      ctx.strokeStyle=spec.color;ctx.lineWidth=2;ctx.strokeRect(b.x-10,b.y-10,20,20);
    }else{
      ctx.beginPath();ctx.arc(b.x,b.y,13,0,7);ctx.fill();
    }
    ctx.restore();
    // Range ring (subtle)
    if(spec.range>0&&b.type!=='sniper'){ctx.save();ctx.strokeStyle=spec.color;ctx.globalAlpha=.05;ctx.beginPath();ctx.arc(b.x,b.y,range,0,7);ctx.stroke();ctx.restore()}
    // HP bar
    const maxHp=b.type==='shield'?220:b.type==='generator'?80:100;
    if(b.hp<maxHp)drawBar(ctx,b.x-18,b.y-24,36,4,b.hp/maxHp,spec.color);
  }
}

function drawEnemies(ctx,s){
  for(const e of s.enemies){
    ctx.save();ctx.shadowColor=e.color;ctx.shadowBlur=e.isBoss?28:14;ctx.fillStyle=e.color;
    if(e.isBoss){
      // Pulsing octagon
      ctx.beginPath();
      for(let i=0;i<8;i++){const a=i/8*7.28-.4;const r=e.size+Math.sin(Date.now()*.005)*4;ctx.lineTo(e.x+Math.cos(a)*r,e.y+Math.sin(a)*r)}
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#000';ctx.font=`bold ${Math.floor(e.size*.5)}px Arial`;ctx.textAlign='center';ctx.fillText('☠',e.x,e.y+e.size*.18);ctx.textAlign='left';
    }else{
      // Hexagon
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i/6*6.28-.5;ctx.lineTo(e.x+Math.cos(a)*e.size,e.y+Math.sin(a)*e.size)}
      ctx.closePath();ctx.fill();
    }
    ctx.restore();
    // HP bar
    if(e.hp<e.maxHp)drawBar(ctx,e.x-(e.isBoss?26:16),e.y-e.size-10,e.isBoss?52:32,e.isBoss?6:4,e.hp/e.maxHp,e.hp>e.maxHp*.3?C.white:C.red);
  }
}

function drawProjectiles(ctx,s){
  for(const p of s.projectiles){
    // Trail
    if(p.trail.length>1){
      ctx.save();ctx.strokeStyle=p.color;ctx.globalAlpha=.3;ctx.lineWidth=2;ctx.beginPath();
      p.trail.forEach((t,i)=>i?ctx.lineTo(t.x,t.y):ctx.moveTo(t.x,t.y));ctx.lineTo(p.x,p.y);ctx.stroke();ctx.restore();
    }
    ctx.save();ctx.shadowColor=p.color;ctx.shadowBlur=p.type==='sniper'?20:12;ctx.fillStyle=p.color;
    if(p.type==='sniper'){
      ctx.strokeStyle=p.color;ctx.lineWidth=2.5;const a=Math.atan2(p.vy,p.vx);
      ctx.beginPath();ctx.moveTo(p.x-Math.cos(a)*20,p.y-Math.sin(a)*20);ctx.lineTo(p.x+Math.cos(a)*10,p.y+Math.sin(a)*10);ctx.stroke();
    }else{
      const sz=p.type==='missile'?5:3;ctx.beginPath();ctx.arc(p.x,p.y,sz,0,7);ctx.fill();
    }
    ctx.restore();
  }
}

function drawParticles(ctx,s){
  for(const p of s.particles){const a=Math.max(0,p.life/p.max);ctx.globalAlpha=a;ctx.fillStyle=p.color;const sz=p.size||3;ctx.fillRect(p.x-sz/2,p.y-sz/2,sz,sz)}
  ctx.globalAlpha=1;
  // Float texts
  ctx.textAlign='center';
  for(const t of s.texts){
    const a=Math.max(0,t.life/t.max);ctx.globalAlpha=a;ctx.fillStyle=t.color;ctx.font='bold 14px Arial';ctx.fillText(t.text,t.x,t.y);
  }
  ctx.globalAlpha=1;ctx.textAlign='left';
}

function drawGhost(ctx,s){
  const spec=BLD[s.selected];if(!spec)return;
  const gx=s.mouse.gridX,gy=s.mouse.gridY,can=canBuild(s.selected,gx,gy);
  const range=spec.range*s.upgRange;
  ctx.save();ctx.globalAlpha=.45;ctx.fillStyle=can?spec.color:C.red;
  if(s.selected==='generator'){ctx.beginPath();ctx.moveTo(gx,gy-17);ctx.lineTo(gx+15,gy);ctx.lineTo(gx,gy+17);ctx.lineTo(gx-15,gy);ctx.closePath();ctx.fill()}
  else if(s.selected==='shield'){ctx.beginPath();ctx.arc(gx,gy,TILE*.75,0,7);ctx.fill()}
  else if(s.selected==='sniper'){ctx.beginPath();ctx.moveTo(gx,gy-17);ctx.lineTo(gx+15,gy+11);ctx.lineTo(gx-15,gy+11);ctx.closePath();ctx.fill()}
  else if(s.selected==='missile'){ctx.fillRect(gx-10,gy-10,20,20)}
  else{ctx.beginPath();ctx.arc(gx,gy,13,0,7);ctx.fill()}
  // Range ring
  if(spec.range>0){ctx.strokeStyle=can?spec.color:C.red;ctx.globalAlpha=.2;ctx.beginPath();ctx.arc(gx,gy,range,0,7);ctx.stroke()}
  ctx.restore();
}

function drawMsg(ctx,s,W){
  if(!s.message||s.msgTimer<=0)return;
  const a=Math.min(1,s.msgTimer);
  ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,.7)';const bw=500,bh=52;ctx.fillRect(W/2-bw/2,78,bw,bh);
  ctx.strokeStyle=s.isBossWave?C.pink:C.cyan;ctx.lineWidth=1.5;ctx.strokeRect(W/2-bw/2,78,bw,bh);
  ctx.fillStyle=C.white;ctx.font='900 22px Arial';ctx.fillText(s.message,W/2,112);
  ctx.textAlign='left';ctx.restore();
}

function drawMenu(ctx,s,W,H){
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=C.cyan;ctx.font='900 80px Arial';ctx.fillText('NEON',W/2,H/2-110);
  ctx.fillStyle=C.pink;ctx.font='900 60px Arial';ctx.fillText('COMMAND',W/2,H/2-40);
  ctx.fillStyle=C.green;ctx.font='17px Arial';ctx.fillText('Tower Defense – Mehr Spaß Edition',W/2,H/2+5);
  ctx.fillStyle=C.white;ctx.font='14px Arial';
  ctx.fillText('Klick = Bauen · 1-5 = Gebäudetyp · Q = Orbital Strike',W/2,H/2+40);
  ctx.fillText('U = Upgrades · Leertaste = Pause · R = Neustart',W/2,H/2+65);
  ctx.fillStyle=C.yellow;ctx.font='13px Arial';
  ctx.fillText('Tipp: Baue erst Generatoren, dann Laser!',W/2,H/2+95);
  ctx.fillStyle=C.cyan;ctx.font='900 22px Arial';ctx.fillText('Enter = Start',W/2,H/2+135);
  ctx.textAlign='left';
}

function drawOverlay(ctx,W,H,text,color,s){
  ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle=color;ctx.font='900 52px Arial';ctx.fillText(text,W/2,H/2-35);
  ctx.fillStyle=C.white;ctx.font='20px Arial';
  ctx.fillText(`Welle ${s.wave} · Kills ${s.kills} · Score ${s.score}`,W/2,H/2+15);
  ctx.fillStyle=C.yellow;ctx.font='16px Arial';ctx.fillText(`Bester Combo: ${s.bestStreak||0}x`,W/2,H/2+45);
  ctx.fillStyle='#aaa';ctx.font='16px Arial';ctx.fillText('R = Neustart',W/2,H/2+80);
  ctx.textAlign='left';
}

function drawUpgradeScreen(ctx,s,W,H){
  ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle=C.cyan;ctx.font='900 40px Arial';ctx.fillText('UPGRADES',W/2,80);
  ctx.fillStyle='#aaa';ctx.font='14px Arial';ctx.fillText(`Data: ${Math.floor(s.data)} · Wähle mit 1-6 · Esc = Zurück`,W/2,115);
  s.upgChoices.forEach((u,i)=>{
    const x=W/2-240+i*160,y=150;
    const affordable=s.data>=u.cost;
    ctx.fillStyle=affordable?'rgba(0,217,255,.12)':'rgba(60,60,60,.2)';
    ctx.fillRect(x,y,140,110);ctx.strokeStyle=affordable?C.cyan:'#444';ctx.lineWidth=1.5;ctx.strokeRect(x,y,140,110);
    ctx.fillStyle=affordable?C.white:'#666';ctx.font='900 18px Arial';ctx.fillText(`[${i+1}]`,x+70,y+30);
    ctx.font='13px Arial';ctx.fillText(u.label,x+70,y+55);
    ctx.fillStyle=affordable?C.yellow:'#444';ctx.font='12px Arial';ctx.fillText(`${u.cost} Data`,x+70,y+80);
    ctx.fillStyle=C.green;ctx.font='11px Arial';ctx.fillText(u.icon,x+70,y+100);
  });
  ctx.textAlign='left';
}

// ====== HUD ======
function renderHud(s){
  const el=document.getElementById('hud');
  if(s.mode==='menu'){el.innerHTML='<strong style="color:#00d9ff">NEON COMMAND</strong><br>Enter starten';return}
  const hp=Math.max(0,Math.floor(s.core.hp)),en=Math.floor(s.energy);
  const orb=Math.max(0,Math.ceil(s.orbitalCd));
  const streak=s.killStreak>=3?`<span style="color:${C.yellow}">🔥 ${s.killStreak}x Combo!</span>`:'';
  el.innerHTML=`
    <div style="font-size:14px;font-weight:900;color:${C.cyan};margin-bottom:4px">NEON COMMAND</div>
    <div>Welle <b>${s.wave}</b> · Kills <b>${s.kills}</b> · Score <b style="color:${C.yellow}">${s.score}</b></div>
    <div>Energy <b style="color:${C.yellow}">${en}</b> <span style="color:#888">(+${Math.floor(s.income*s.upgIncome)}/s)</span></div>
    <div>Data <b style="color:${C.violet}">${Math.floor(s.data)}</b> <span style="color:#888">[U] Upgrades</span></div>
    <div>Core <b style="color:${hp>s.core.maxHp*.3?C.green:C.red}">${hp}/${s.core.maxHp}</b></div>
    <div>Orbital <b style="color:${C.violet}">${orb>0?orb+'s':'BEREIT [Q]'}</b></div>
    ${streak}
  `;
}

function renderShop(s){
  const el=document.getElementById('shop');
  if(s.mode==='menu'||s.mode==='gameover'){el.innerHTML='';return}
  let html='';
  for(const[key,spec]of Object.entries(BLD)){
    const active=s.selected===key;
    html+=`<div class="shop-item${active?' active':''}"><div class="key">${spec.key}</div><div class="name" style="color:${spec.color}">${spec.label}</div><div class="cost">${spec.cost}E</div></div>`;
  }
  el.innerHTML=html;
}

// ====== GAME STATE ======
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W=0,H=0,S,lastT=0;

function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;if(S){S.core.x=snap(W*.32);S.core.y=snap(H*.5)}}

function createState(){
  return{
    version:VERSION,mode:'menu',selected:'laser',
    energy:250,income:8,data:0,score:0,
    core:{x:snap(innerWidth*.32),y:snap(innerHeight*.5),hp:200,maxHp:200},
    buildings:[],enemies:[],projectiles:[],particles:[],texts:[],
    wave:0,waveTimer:2,waveBudget:0,isBossWave:false,
    kills:0,paused:false,
    mouse:{x:innerWidth/2,y:innerHeight/2,gridX:0,gridY:0},
    message:'',msgTimer:0,
    // Upgrades
    upgDmg:1,upgRate:1,upgRange:1,upgIncome:1,upgGen:0,
    // Combat
    killStreak:0,killTimer:0,bestStreak:0,
    // Orbital
    orbitalCd:0,
    // Upgrade screen
    upgChoices:[],
    shake:0,
  };
}

function startGame(){
  S=createState();S.mode='playing';
  S.message='Baue Generatoren für Einkommen, dann Laser!';S.msgTimer=5;
  spawnWave(S);
}

function canBuild(type,x,y){
  const spec=BLD[type];
  if(!spec||S.energy<spec.cost)return false;
  if(Math.hypot(x-S.core.x,y-S.core.y)<TILE*1.5)return false;
  return!S.buildings.some(b=>b.x===x&&b.y===y);
}

function build(type,x,y){
  if(!canBuild(type,x,y))return;
  const spec=BLD[type];S.energy-=spec.cost;
  const hp=spec.hp||(type==='generator'?80:type==='shield'?220:100);
  S.buildings.push({type,x,y,cooldown:0,hp});
  burst(S,x,y,spec.color,22);
  floatText(S,x,y-25,`${spec.label} gebaut!`,spec.color);
}

function openUpgrades(){
  if(S.data<20)return;
  S.mode='upgrading';
  // Pick 4 random upgrades
  S.upgChoices=[...UPGRADES].sort(()=>Math.random()-.5).slice(0,4);
}

function buyUpgrade(i){
  const u=S.upgChoices[i];if(!u||S.data<u.cost)return;
  S.data-=u.cost;u.apply(S);
  floatText(S,W/2,H/2,u.label,C.green);
  burst(S,W/2,H/2,C.cyan,30);
  S.mode='playing';S.upgChoices=[];
}

// ====== INPUT ======
canvas.addEventListener('mousemove',e=>{S.mouse.x=e.clientX;S.mouse.y=e.clientY;S.mouse.gridX=snap(e.clientX);S.mouse.gridY=snap(e.clientY)});
canvas.addEventListener('click',()=>{
  if(S.mode==='menu'){startGame();return}
  if(S.mode==='playing')build(S.selected,S.mouse.gridX,S.mouse.gridY);
});
addEventListener('keydown',e=>{
  if(e.key==='Enter'&&S.mode==='menu')startGame();
  if(e.key==='r'||e.key==='R')startGame();
  if(e.code==='Space'){e.preventDefault();if(S.mode==='playing')S.paused=!S.paused;else if(S.mode==='upgrading'){S.mode='playing';S.upgChoices=[]}}
  if(e.key==='Escape'&&S.mode==='upgrading'){S.mode='playing';S.upgChoices=[]}

  if(S.mode==='upgrading'){
    if(e.key>='1'&&e.key<='6')buyUpgrade(+e.key-1);
    return;
  }

  if(e.key==='1')S.selected='laser';
  if(e.key==='2')S.selected='missile';
  if(e.key==='3')S.selected='generator';
  if(e.key==='4')S.selected='shield';
  if(e.key==='5')S.selected='sniper';
  if(e.key==='q'||e.key==='Q')orbitalStrike(S);
  if(e.key==='u'||e.key==='U')openUpgrades();
});
addEventListener('resize',resize);

// ====== GAME LOOP ======
function frame(time=0){
  const dt=Math.min(.033,(time-lastT)/1000||0);lastT=time;

  // Always update
  if(S.msgTimer>0)S.msgTimer-=dt;
  if(S.orbitalCd>0)S.orbitalCd-=dt;
  S.shake=Math.max(0,S.shake-30*dt);

  if(S.mode==='playing'&&!S.paused){
    updateResources(S,dt);updateWaves(S,W,H,dt);updateCombat(S,dt);updateParticles(S,dt);
    // Track best streak
    if(S.killStreak>(S.bestStreak||0))S.bestStreak=S.killStreak;
    // Game over
    if(S.core.hp<=0){S.core.hp=0;S.mode='gameover';burst(S,S.core.x,S.core.y,C.red,80,2);S.shake=25}
  }
  if(S.mode==='upgrading')updateParticles(S,dt);

  // ====== DRAW ======
  ctx.save();
  if(S.shake>0)ctx.translate((Math.random()-.5)*S.shake,(Math.random()-.5)*S.shake);
  drawBG(ctx,W,H);

  if(S.mode==='menu'){drawMenu(ctx,S,W,H)}
  else{
    drawBuildings(ctx,S);drawCore(ctx,S);drawEnemies(ctx,S);drawProjectiles(ctx,S);drawParticles(ctx,S);drawMsg(ctx,S,W);
    if(S.mode==='playing')drawGhost(ctx,S);
    if(S.mode==='gameover')drawOverlay(ctx,W,H,'CORE DESTROYED',C.red,S);
    if(S.paused)drawOverlay(ctx,W,H,'PAUSED',C.cyan,S);
    if(S.mode==='upgrading')drawUpgradeScreen(ctx,S,W,H);
  }

  ctx.restore();
  renderHud(S);renderShop(S);
  requestAnimationFrame(frame);
}

resize();S=createState();frame();
</script>
</body>
</html>

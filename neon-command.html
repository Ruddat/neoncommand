<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Command</title>
  <style>
    html, body, #app {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #050816;
      color: #fff;
      font-family: 'Courier New', monospace;
    }
    #game {
      display: block;
      cursor: crosshair;
    }
    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 12px 16px;
      background: rgba(4, 7, 20, 0.85);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: none;
      min-width: 280px;
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
    }
    .help {
      position: fixed;
      bottom: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(4, 7, 20, 0.75);
      border: 1px solid rgba(125, 92, 255, 0.3);
      border-radius: 4px;
      font-size: 12px;
      color: #7d5cff;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game" aria-label="Neon Command game canvas"></canvas>
    <div id="hud" class="hud"></div>
    <div id="help" class="help">
      <strong>NEON COMMAND</strong><br />
      1-5: Geb&auml;ude w&auml;hlen &middot; Klick: Bauen &middot; R: Neustart &middot; Leertaste: Pause
    </div>
  </div>

<script>
// ========== CONSTANTS ==========
const TILE = 48;
const VERSION = '0.2.0';

function snap(value) {
  return Math.floor(value / TILE) * TILE + TILE / 2;
}

// ========== BUILDINGS ==========
const BUILDINGS = {
  laser: { label: 'Laser Turret', key: '1', cost: 35, range: 210, fireRate: 0.22, damage: 14, color: '#ff2bd6', description: 'Schnelle Einzelfeuer-Verteidigung.' },
  missile: { label: 'Missile Turret', key: '2', cost: 70, range: 280, fireRate: 0.08, damage: 42, color: '#ffb000', description: 'Langsamer Raketenwerfer mit Flächenschaden.' },
  generator: { label: 'Generator', key: '3', cost: 55, range: 0, fireRate: 0, damage: 0, color: '#00ff9d', description: 'Erhöht Energie- und Data-Einkommen.' },
  shield: { label: 'Schild', key: '4', cost: 90, range: 0, fireRate: 0, damage: 0, color: '#7d5cff', description: 'Schützt den Kern und heilt ihn langsam.', hp: 200, healRate: 6 },
  sniper: { label: 'Sniper Turret', key: '5', cost: 100, range: 420, fireRate: 0.04, damage: 85, color: '#00d9ff', description: 'Extrem Reichweite, langsamer Schuss, hoher Schaden.' },
};

// ========== ENEMY TYPES ==========
const ENEMY_TYPES = {
  scout: { hp: 42, speed: 68, size: 10, reward: 6, color: '#ff345d', energyReward: 3 },
  soldier: { hp: 80, speed: 48, size: 14, reward: 10, color: '#ff6b35', energyReward: 5 },
  tank: { hp: 200, speed: 28, size: 20, reward: 22, color: '#ffb000', energyReward: 10 },
  runner: { hp: 35, speed: 130, size: 9, reward: 8, color: '#00ff9d', energyReward: 4 },
  boss: { hp: 1200, speed: 22, size: 36, reward: 200, color: '#ff2bd6', energyReward: 50, isBoss: true },
};

// ========== PARTICLE SYSTEM ==========
function burst(state, x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 150;
    state.particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 0.35 + Math.random() * 0.5, maxLife: 0.85, color });
  }
}

function updateParticles(state, dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
}

// ========== RESOURCE SYSTEM ==========
function updateResources(state, dt) {
  const generators = state.buildings.filter(b => b.type === 'generator').length;
  state.income = 7 + generators * 4;
  state.energy += state.income * dt;
  state.data += (1 + generators * 0.4) * dt;
}

// ========== WAVE SYSTEM ==========
function spawnWave(state) {
  state.wave += 1;
  const isBossWave = state.wave % 5 === 0;
  state.waveBudget = isBossWave ? 3 + Math.floor(state.wave / 5) : 6 + state.wave * 3;
  state.waveTimer = 0;
  state.isBossWave = isBossWave;
  if (isBossWave) { state.message = `BOSS WELLE ${state.wave}!`; burst(state, state.core.x, state.core.y, '#ff2bd6', 30); }
  else { state.message = `Welle ${state.wave}`; }
  state.msgTimer = 3;
}

function updateWaves(state, width, height, dt) {
  state.waveTimer += dt;
  if (state.waveBudget > 0) {
    const spawnDelay = Math.max(0.15, 0.7 - state.wave * 0.02);
    if (state.waveTimer > spawnDelay) {
      spawnOneEnemy(state, width, height);
      state.waveBudget--;
      state.waveTimer = 0;
    }
  }
  if (state.waveBudget === 0 && state.enemies.length === 0 && state.waveTimer > 3.5) {
    spawnWave(state);
  }
}

function spawnOneEnemy(state, width, height) {
  if (state.isBossWave && state.waveBudget === 3 + Math.floor(state.wave / 5)) {
    spawnSpecificEnemy(state, width, height, 'boss'); return;
  }
  const wave = state.wave;
  const roll = Math.random();
  let type;
  if (wave < 3) type = 'scout';
  else if (wave < 6) type = roll < 0.5 ? 'scout' : roll < 0.85 ? 'soldier' : 'runner';
  else if (wave < 10) type = roll < 0.25 ? 'scout' : roll < 0.55 ? 'soldier' : roll < 0.75 ? 'runner' : 'tank';
  else type = roll < 0.15 ? 'scout' : roll < 0.40 ? 'soldier' : roll < 0.60 ? 'runner' : roll < 0.85 ? 'tank' : 'runner';
  spawnSpecificEnemy(state, width, height, type);
}

function spawnSpecificEnemy(state, width, height, typeName) {
  const spec = ENEMY_TYPES[typeName]; if (!spec) return;
  const side = Math.random();
  let x, y;
  if (side < 0.6) { x = width + 40; y = Math.random() * height; }
  else if (side < 0.8) { x = Math.random() * width; y = -40; }
  else { x = Math.random() * width; y = height + 40; }
  const waveScale = 1 + (state.wave - 1) * 0.08;
  state.enemies.push({ x, y, hp: spec.hp * waveScale, maxHp: spec.hp * waveScale, speed: spec.speed, size: spec.size, reward: spec.reward, color: spec.color, isBoss: spec.isBoss || false });
}

// ========== COMBAT SYSTEM ==========
function updateCombat(state, dt) {
  const { buildings, enemies, projectiles, core } = state;

  // Shield healing
  for (const b of buildings) {
    if (b.type === 'shield' && core.hp < core.maxHp) {
      core.hp = Math.min(core.maxHp, core.hp + 6 * dt);
    }
  }

  // Turrets fire
  for (const building of buildings) {
    if (building.type === 'generator' || building.type === 'shield') continue;
    const spec = BUILDINGS[building.type]; if (!spec || spec.range === 0) continue;
    building.cooldown -= dt;
    if (building.cooldown > 0) continue;
    let target = null, bestDist = spec.range;
    for (const enemy of enemies) {
      const dist = Math.hypot(enemy.x - building.x, enemy.y - building.y);
      if (dist < bestDist) { bestDist = dist; target = enemy; }
    }
    if (target) {
      building.cooldown = 1 / (spec.fireRate || 1);
      const angle = Math.atan2(target.y - building.y, target.x - building.x);
      const speed = building.type === 'missile' ? 340 : building.type === 'sniper' ? 900 : 620;
      projectiles.push({ x: building.x, y: building.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, damage: spec.damage, color: spec.color, type: building.type, life: 3, splash: building.type === 'missile' ? 80 : 0 });
    }
  }

  // Move projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0 || p.x < -200 || p.x > 4000 || p.y < -200 || p.y > 4000) { projectiles.splice(i, 1); continue; }
    let hit = false;
    for (const enemy of enemies) {
      const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
      const hitRadius = p.type === 'sniper' ? enemy.size + 10 : enemy.size + 6;
      if (dist < hitRadius) {
        enemy.hp -= p.damage;
        burst(state, p.x, p.y, p.color, 8);
        if (p.type === 'sniper') { const a = Math.atan2(enemy.y - p.y, enemy.x - p.x); enemy.x += Math.cos(a) * 8; enemy.y += Math.sin(a) * 8; }
        if (p.splash > 0) {
          for (const other of enemies) { if (other === enemy) continue; const sd = Math.hypot(p.x - other.x, p.y - other.y); if (sd < p.splash) { other.hp -= p.damage * (1 - sd / p.splash) * 0.6; burst(state, other.x, other.y, p.color, 4); } }
          burst(state, p.x, p.y, p.color, 20);
        }
        hit = true; break;
      }
    }
    if (hit) projectiles.splice(i, 1);
  }

  // Move enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const enemy = enemies[i];
    const dx = core.x - enemy.x, dy = core.y - enemy.y;
    const dist = Math.hypot(dx, dy) || 1;
    enemy.x += (dx / dist) * enemy.speed * dt;
    enemy.y += (dy / dist) * enemy.speed * dt;
    if (dist < TILE * 0.8) { core.hp -= (enemy.isBoss ? 25 : 12) * dt; burst(state, core.x, core.y, '#ff345d', 3); }
    for (let j = buildings.length - 1; j >= 0; j--) {
      const b = buildings[j];
      const bd = Math.hypot(enemy.x - b.x, enemy.y - b.y);
      const collisionRange = b.type === 'shield' ? TILE * 0.8 : TILE * 0.5;
      if (bd < collisionRange) {
        b.hp -= (enemy.isBoss ? 20 : 8) * dt;
        if (b.type === 'shield') { enemy.hp -= 5 * dt; enemy.speed = Math.max(10, enemy.speed * 0.98); }
        if (b.hp <= 0) { burst(state, b.x, b.y, '#ff345d', 25); buildings.splice(j, 1); }
      }
    }
    if (enemy.hp <= 0) {
      state.kills++; state.score += enemy.reward || 100; state.energy += (enemy.reward || 7) * 0.5;
      burst(state, enemy.x, enemy.y, enemy.color || '#00d9ff', enemy.isBoss ? 40 : 14);
      enemies.splice(i, 1);
    }
  }
}

// ========== RENDERER ==========
function drawBar(ctx, x, y, w, h, value, color) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = color; ctx.fillRect(x, y, w * Math.max(0, Math.min(1, value)), h);
}

function drawBackground(ctx, w, h) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#040714'); g.addColorStop(1, '#03040a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(0,217,255,0.07)'; ctx.lineWidth = 1;
  for (let x = 0; x < w; x += TILE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y < h; y += TILE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
}

function drawCore(ctx, state) {
  const { core } = state;
  const pulse = 1 + Math.sin(Date.now() * 0.003) * 0.08;
  ctx.save(); ctx.shadowColor = '#00d9ff'; ctx.shadowBlur = 30 + pulse * 10;
  ctx.fillStyle = '#00d9ff'; ctx.beginPath(); ctx.arc(core.x, core.y, 22, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  ctx.strokeStyle = '#7d5cff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(core.x, core.y, 28 * pulse, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(core.x, core.y - 10); ctx.lineTo(core.x + 8, core.y); ctx.lineTo(core.x, core.y + 10); ctx.lineTo(core.x - 8, core.y); ctx.closePath(); ctx.fill();
  drawBar(ctx, core.x - 30, core.y + 34, 60, 6, core.hp / core.maxHp, core.hp > 40 ? '#00ff9d' : '#ff345d');
}

function drawBuildings(ctx, state) {
  for (const b of state.buildings) {
    const spec = BUILDINGS[b.type]; if (!spec) continue;
    ctx.save(); ctx.shadowColor = spec.color; ctx.shadowBlur = 14; ctx.fillStyle = spec.color;
    if (b.type === 'generator') {
      ctx.beginPath(); ctx.moveTo(b.x, b.y - 16); ctx.lineTo(b.x + 14, b.y); ctx.lineTo(b.x, b.y + 16); ctx.lineTo(b.x - 14, b.y); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(0,255,157,0.3)'; const p = 1 + Math.sin(Date.now() * 0.005 + b.x) * 0.3;
      ctx.beginPath(); ctx.arc(b.x, b.y, 6 * p, 0, Math.PI * 2); ctx.fill();
    } else if (b.type === 'shield') {
      ctx.globalAlpha = 0.25; ctx.beginPath(); ctx.arc(b.x, b.y, TILE * 0.8, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.8; ctx.strokeStyle = spec.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(b.x, b.y, TILE * 0.8, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1; ctx.fillStyle = '#fff'; ctx.font = '14px Arial'; ctx.textAlign = 'center'; ctx.fillText('S', b.x, b.y + 5); ctx.textAlign = 'left';
    } else if (b.type === 'sniper') {
      ctx.beginPath(); ctx.moveTo(b.x, b.y - 16); ctx.lineTo(b.x + 14, b.y + 10); ctx.lineTo(b.x - 14, b.y + 10); ctx.closePath(); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(b.x, b.y, 12, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    if (spec.range > 0) { ctx.save(); ctx.strokeStyle = spec.color; ctx.globalAlpha = 0.06; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(b.x, b.y, spec.range, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }
    const maxHp = b.type === 'shield' ? 200 : b.type === 'generator' ? 65 : 90;
    drawBar(ctx, b.x - 18, b.y - 24, 36, 4, b.hp / maxHp, spec.color);
  }
}

function drawEnemies(ctx, state) {
  for (const e of state.enemies) {
    ctx.save(); ctx.shadowColor = e.color; ctx.shadowBlur = e.isBoss ? 24 : 12; ctx.fillStyle = e.color;
    if (e.isBoss) {
      ctx.beginPath();
      for (let i = 0; i < 8; i++) { const a = (Math.PI / 4) * i - Math.PI / 8; const r = e.size + Math.sin(Date.now() * 0.006) * 3; const px = e.x + Math.cos(a) * r; const py = e.y + Math.sin(a) * r; if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = `bold ${Math.floor(e.size * 0.6)}px Arial`; ctx.textAlign = 'center'; ctx.fillText('X', e.x, e.y + e.size * 0.2); ctx.textAlign = 'left';
    } else {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) { const a = (Math.PI / 3) * i - Math.PI / 6; const r = e.size; const px = e.x + Math.cos(a) * r; const py = e.y + Math.sin(a) * r; if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    if (e.hp < e.maxHp) drawBar(ctx, e.x - (e.isBoss ? 24 : 16), e.y - e.size - 10, e.isBoss ? 48 : 32, e.isBoss ? 6 : 4, e.hp / e.maxHp, e.hp > e.maxHp * 0.35 ? '#fff' : '#ff345d');
  }
}

function drawProjectiles(ctx, state) {
  for (const p of state.projectiles) {
    ctx.save(); ctx.shadowColor = p.color; ctx.shadowBlur = p.type === 'sniper' ? 18 : 10; ctx.fillStyle = p.color;
    if (p.type === 'sniper') {
      ctx.strokeStyle = p.color; ctx.lineWidth = 2; const angle = Math.atan2(p.vy, p.vx);
      ctx.beginPath(); ctx.moveTo(p.x - Math.cos(angle) * 16, p.y - Math.sin(angle) * 16); ctx.lineTo(p.x + Math.cos(angle) * 8, p.y + Math.sin(angle) * 8); ctx.stroke();
    } else {
      const size = p.type === 'missile' ? 5 : 3; ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawParticles(ctx, state) {
  for (const p of state.particles) {
    const alpha = Math.max(0, p.life / p.maxLife); ctx.globalAlpha = alpha; ctx.fillStyle = p.color;
    const s = 2 + alpha * 3; ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
  }
  ctx.globalAlpha = 1;
}

function drawGhost(ctx, state, canBuildFn) {
  const spec = BUILDINGS[state.selected]; if (!spec) return;
  const gx = state.mouse.gridX, gy = state.mouse.gridY;
  const can = canBuildFn(state.selected, gx, gy);
  ctx.save(); ctx.globalAlpha = 0.4; ctx.fillStyle = can ? spec.color : '#ff345d';
  if (state.selected === 'generator') { ctx.beginPath(); ctx.moveTo(gx, gy - 16); ctx.lineTo(gx + 14, gy); ctx.lineTo(gx, gy + 16); ctx.lineTo(gx - 14, gy); ctx.closePath(); ctx.fill(); }
  else if (state.selected === 'shield') { ctx.beginPath(); ctx.arc(gx, gy, TILE * 0.8, 0, Math.PI * 2); ctx.fill(); }
  else if (state.selected === 'sniper') { ctx.beginPath(); ctx.moveTo(gx, gy - 16); ctx.lineTo(gx + 14, gy + 10); ctx.lineTo(gx - 14, gy + 10); ctx.closePath(); ctx.fill(); }
  else { ctx.beginPath(); ctx.arc(gx, gy, 12, 0, Math.PI * 2); ctx.fill(); }
  if (spec.range > 0) { ctx.strokeStyle = can ? spec.color : '#ff345d'; ctx.globalAlpha = 0.15; ctx.beginPath(); ctx.arc(gx, gy, spec.range, 0, Math.PI * 2); ctx.stroke(); }
  ctx.restore();
}

function drawMessage(ctx, state, w) {
  if (!state.message || state.msgTimer <= 0) return;
  const alpha = Math.min(1, state.msgTimer);
  ctx.save(); ctx.globalAlpha = alpha; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(w / 2 - 280, 80, 560, 50);
  ctx.strokeStyle = '#ff2bd6'; ctx.lineWidth = 1; ctx.strokeRect(w / 2 - 280, 80, 560, 50);
  ctx.fillStyle = '#fff'; ctx.font = '900 22px Arial'; ctx.fillText(state.message, w / 2, 112);
  ctx.textAlign = 'left'; ctx.restore();
}

function drawMenu(ctx, state, w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, w, h);
  ctx.textAlign = 'center'; ctx.fillStyle = '#00d9ff'; ctx.font = '900 76px Arial'; ctx.fillText('NEON', w / 2, h / 2 - 100);
  ctx.fillStyle = '#ff2bd6'; ctx.font = '900 56px Arial'; ctx.fillText('COMMAND', w / 2, h / 2 - 35);
  ctx.fillStyle = '#00ff9d'; ctx.font = '18px Arial'; ctx.fillText('Tower Defense Strategy Game', w / 2, h / 2 + 15);
  ctx.fillStyle = '#fff'; ctx.font = '16px Arial';
  ctx.fillText('1: Laser \u00b7 2: Raketen \u00b7 3: Generator \u00b7 4: Schild \u00b7 5: Sniper', w / 2, h / 2 + 55);
  ctx.fillText('Klick zum Bauen \u00b7 Leertaste: Pause \u00b7 R: Neustart', w / 2, h / 2 + 85);
  ctx.fillStyle = '#00d9ff'; ctx.font = '20px Arial'; ctx.fillText('Enter startet den Run', w / 2, h / 2 + 130);
  ctx.textAlign = 'left';
}

function drawOverlay(ctx, w, h, text, color, state) {
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0, 0, w, h);
  ctx.textAlign = 'center'; ctx.fillStyle = color; ctx.font = '900 54px Arial'; ctx.fillText(text, w / 2, h / 2 - 30);
  ctx.fillStyle = '#fff'; ctx.font = '20px Arial';
  ctx.fillText(`Welle ${state.wave} \u00b7 Kills ${state.kills} \u00b7 Score ${state.score || 0}`, w / 2, h / 2 + 20);
  ctx.fillText('R = Neustart', w / 2, h / 2 + 60);
  ctx.textAlign = 'left';
}

// ========== HUD ==========
function renderHud(state) {
  const hudEl = document.getElementById('hud');
  if (state.mode === 'menu') { hudEl.innerHTML = '<strong>NEON COMMAND</strong><br>Enter starten'; return; }
  const sel = state.selected;
  let weapons = '';
  for (const [key, spec] of Object.entries(BUILDINGS)) {
    const isActive = key === sel;
    const affordable = state.energy >= spec.cost;
    const style = isActive ? `color:${spec.color};font-weight:bold;text-decoration:underline` : affordable ? 'color:#aaa' : 'color:#555';
    weapons += `<span style="${style}">[${spec.key}] ${spec.label} (${spec.cost}E)</span> \u00b7 `;
  }
  const coreHp = Math.max(0, Math.floor(state.core.hp));
  const energy = Math.floor(state.energy);
  hudEl.innerHTML = `
    <div style="font-size:15px;font-weight:900;color:#00d9ff;margin-bottom:6px">NEON COMMAND</div>
    <div>Welle <b>${state.wave}</b> \u00b7 Kills <b>${state.kills}</b> \u00b7 Score <b style="color:#ffb000">${state.score || 0}</b></div>
    <div>Energy <b style="color:#ffb000">${energy}</b> (+${state.income}/s)</div>
    <div>Data <b style="color:#7d5cff">${Math.floor(state.data)}</b></div>
    <div>Core HP <b style="color:${coreHp > 40 ? '#00ff9d' : '#ff345d'}">${coreHp}/${state.core.maxHp}</b></div>
    <hr style="border-color:#00d9ff33;margin:6px 0">
    <div style="font-size:11px;line-height:1.6">${weapons}</div>
    <div style="font-size:10px;color:#666;margin-top:4px">Klick: Bauen \u00b7 1-5: W\u00e4hlen \u00b7 Space: Pause \u00b7 R: Neustart</div>
  `;
}

// ========== GAME ==========
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, S, lastTime = 0;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; if (S) { S.core.x = snap(W * 0.32); S.core.y = snap(H * 0.5); } }

function createState() {
  return {
    version: VERSION, mode: 'menu', selected: 'laser', energy: 180, income: 7, data: 0, score: 0,
    core: { x: snap(innerWidth * 0.32), y: snap(innerHeight * 0.5), hp: 100, maxHp: 100 },
    buildings: [], enemies: [], projectiles: [], particles: [],
    wave: 0, waveTimer: 2, waveBudget: 0, isBossWave: false, kills: 0, paused: false,
    mouse: { x: 0, y: 0, gridX: 0, gridY: 0 },
    message: 'Press Enter to start command uplink', msgTimer: 0,
  };
}

function startGame() {
  S = createState(); S.mode = 'playing'; S.message = 'Baue Generatoren und T\u00fcrme. Halte die Linie!'; S.msgTimer = 4; spawnWave(S);
}

function canBuild(type, x, y) {
  const spec = BUILDINGS[type];
  if (!spec || S.energy < spec.cost) return false;
  if (Math.hypot(x - S.core.x, y - S.core.y) < TILE * 1.4) return false;
  return !S.buildings.some(b => b.x === x && b.y === y);
}

function build(type, x, y) {
  if (!canBuild(type, x, y)) return;
  const spec = BUILDINGS[type]; S.energy -= spec.cost;
  const hp = spec.hp || (type === 'generator' ? 65 : 90);
  S.buildings.push({ type, x, y, cooldown: 0, hp });
  burst(S, x, y, spec.color, 20);
  S.message = `${spec.label} gebaut! (-${spec.cost}E)`; S.msgTimer = 1.5;
}

// Input
canvas.addEventListener('mousemove', e => { S.mouse.x = e.clientX; S.mouse.y = e.clientY; S.mouse.gridX = snap(e.clientX); S.mouse.gridY = snap(e.clientY); });
canvas.addEventListener('click', () => { if (S.mode === 'menu') { startGame(); return; } if (S.mode === 'playing') build(S.selected, S.mouse.gridX, S.mouse.gridY); });
addEventListener('keydown', e => {
  if (e.key === 'Enter' && S.mode === 'menu') startGame();
  if (e.key === 'r' || e.key === 'R') startGame();
  if (e.code === 'Space') { e.preventDefault(); S.paused = !S.paused; }
  if (e.key === '1') S.selected = 'laser';
  if (e.key === '2') S.selected = 'missile';
  if (e.key === '3') S.selected = 'generator';
  if (e.key === '4') S.selected = 'shield';
  if (e.key === '5') S.selected = 'sniper';
});
addEventListener('resize', resize);

// Game loop
function frame(time = 0) {
  const dt = Math.min(0.033, (time - lastTime) / 1000 || 0);
  lastTime = time;

  // Update
  if (S.msgTimer > 0) S.msgTimer -= dt;
  if (S.mode === 'playing' && !S.paused) {
    updateResources(S, dt); updateWaves(S, W, H, dt); updateCombat(S, dt); updateParticles(S, dt);
    if (S.core.hp <= 0) { S.core.hp = 0; S.mode = 'gameover'; S.message = 'Core zerst\u00f6rt'; burst(S, S.core.x, S.core.y, '#ff345d', 60); }
  }

  // Draw
  ctx.clearRect(0, 0, W, H);
  drawBackground(ctx, W, H);
  if (S.mode === 'menu') { drawMenu(ctx, S, W, H); }
  else {
    drawBuildings(ctx, S); drawCore(ctx, S); drawEnemies(ctx, S); drawProjectiles(ctx, S); drawParticles(ctx, S); drawMessage(ctx, S, W);
    if (S.mode === 'playing') drawGhost(ctx, S, canBuild);
    if (S.mode === 'gameover') drawOverlay(ctx, W, H, 'CORE DESTROYED', '#ff345d', S);
    if (S.paused) drawOverlay(ctx, W, H, 'PAUSED', '#00d9ff', S);
  }
  renderHud(S);
  requestAnimationFrame(frame);
}

resize();
S = createState();
frame();
</script>
</body>

<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON COMMAND – Geopolitik</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:#040714;color:#fff;font-family:'Share Tech Mono','Courier New',monospace}
    canvas{display:block;cursor:crosshair}

    #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
    #ui *{pointer-events:auto}

    /* ====== HUD (top-left) ====== */
    .hud{
      position:fixed;top:10px;left:10px;
      padding:12px 16px;
      background:rgba(4,7,20,.92);
      border:1px solid rgba(0,217,255,.3);
      border-left:3px solid rgba(0,217,255,.6);
      border-radius:0 8px 8px 0;
      font-size:12px;line-height:1.8;min-width:260px;
      box-shadow:0 0 20px rgba(0,217,255,.08),inset 0 0 30px rgba(0,217,255,.03);
      backdrop-filter:blur(8px);
    }
    .hud hr{border:0;border-top:1px solid rgba(0,217,255,.15);margin:5px 0}

    /* ====== INTEL PANEL (top-right) ====== */
    .intel{
      position:fixed;top:10px;right:10px;
      padding:12px 14px;
      background:rgba(4,7,20,.92);
      border:1px solid rgba(125,92,255,.3);
      border-right:3px solid rgba(125,92,255,.6);
      border-radius:8px 0 0 8px;
      font-size:11px;line-height:1.6;min-width:230px;pointer-events:none;
      box-shadow:0 0 20px rgba(125,92,255,.08),inset 0 0 30px rgba(125,92,255,.03);
      backdrop-filter:blur(8px);
    }

    /* ====== DEFCON INDICATOR (top-center) ====== */
    .defcon{
      position:fixed;top:10px;left:50%;transform:translateX(-50%);
      padding:6px 24px;border-radius:6px;
      font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;letter-spacing:4px;
      pointer-events:none;transition:all .3s;
      box-shadow:0 0 25px rgba(0,0,0,.5);
      text-shadow:0 0 10px currentColor;
    }

    /* ====== EVENT LOG (bottom-left) ====== */
    .log{
      position:fixed;bottom:70px;left:10px;
      padding:10px 12px;
      background:rgba(4,7,20,.88);
      border:1px solid rgba(0,217,255,.15);
      border-left:3px solid rgba(0,217,255,.4);
      border-radius:0 6px 6px 0;
      font-size:11px;max-width:380px;max-height:170px;overflow-y:auto;line-height:1.6;
      backdrop-filter:blur(6px);
      scrollbar-width:thin;scrollbar-color:rgba(0,217,255,.2) transparent;
    }
    .log::-webkit-scrollbar{width:4px}
    .log::-webkit-scrollbar-thumb{background:rgba(0,217,255,.3);border-radius:2px}
    .log .g{color:#00ff9d}.log .r{color:#ff345d}.log .y{color:#ffb000}.log .c{color:#00d9ff}.log .p{color:#ff2bd6}

    /* ====== BUILD BAR (bottom-center) ====== */
    .build-bar{
      position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
      display:flex;gap:4px;pointer-events:auto;
      padding:6px 8px;
      background:rgba(4,7,20,.88);
      border:1px solid rgba(0,217,255,.2);
      border-radius:10px;
      box-shadow:0 -2px 20px rgba(0,217,255,.06);
      backdrop-filter:blur(8px);
    }
    .bb{
      padding:7px 12px;
      background:rgba(4,7,20,.9);
      border:1px solid rgba(0,217,255,.2);
      border-radius:6px;
      font-size:10px;text-align:center;min-width:82px;cursor:pointer;
      transition:all .15s;
      position:relative;overflow:hidden;
    }
    .bb::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,rgba(0,217,255,.3),transparent);
      opacity:0;transition:opacity .15s;
    }
    .bb:hover{
      border-color:#00d9ff;
      background:rgba(0,217,255,.08);
      box-shadow:0 0 15px rgba(0,217,255,.15);
    }
    .bb:hover::before{opacity:1}
    .bb.active{
      border-color:#00d9ff;
      box-shadow:0 0 15px rgba(0,217,255,.3),inset 0 0 15px rgba(0,217,255,.05);
      background:rgba(0,217,255,.1);
    }
    .bb.active::before{opacity:1}
    .bb .k{font-weight:900;color:#00d9ff;font-size:14px;font-family:'Orbitron',sans-serif}
    .bb .n{color:#ccc;margin-top:2px;font-size:10px}
    .bb .c{color:#ffb000;font-size:9px;margin-top:1px}

    /* ====== ANIMATIONS ====== */
    @keyframes neonPulse{
      0%,100%{box-shadow:0 0 20px rgba(0,217,255,.08)}
      50%{box-shadow:0 0 30px rgba(0,217,255,.15)}
    }
    @keyframes scanlineMove{
      0%{background-position:0 0}
      100%{background-position:0 4px}
    }
    .hud{animation:neonPulse 4s ease-in-out infinite}
  </style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
  <div id="hud" class="hud"></div>
  <div id="intel" class="intel"></div>
  <div id="defcon" class="defcon"></div>
  <div id="log" class="log"></div>
  <div id="buildbar" class="build-bar"></div>
</div>

<script type="module" src="/src/geo/game.js"></script>
</body>
</html>

<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON COMMAND – Geopolitik</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:#040714;color:#fff;font-family:'Share Tech Mono','Courier New',monospace}
    canvas{display:block;cursor:crosshair}

    #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
    #ui *{pointer-events:auto}

    /* ====== HUD (top-left) ====== */
    .hud{
      position:fixed;top:10px;left:10px;
      padding:14px 18px;
      background:linear-gradient(135deg,rgba(4,7,20,.95),rgba(10,15,35,.92));
      border:1px solid rgba(0,217,255,.25);
      border-left:3px solid rgba(0,217,255,.7);
      border-radius:0 10px 10px 0;
      font-size:12px;line-height:1.7;min-width:270px;
      box-shadow:0 0 25px rgba(0,217,255,.1),inset 0 0 40px rgba(0,217,255,.03),0 4px 20px rgba(0,0,0,.5);
      backdrop-filter:blur(12px);
    }
    .hud hr{border:0;border-top:1px solid rgba(0,217,255,.12);margin:5px 0}

    /* ====== INTEL PANEL (top-right) ====== */
    .intel{
      position:fixed;top:10px;right:10px;
      padding:14px 16px;
      background:linear-gradient(225deg,rgba(4,7,20,.95),rgba(15,10,35,.92));
      border:1px solid rgba(125,92,255,.25);
      border-right:3px solid rgba(125,92,255,.7);
      border-radius:10px 0 0 10px;
      font-size:11px;line-height:1.6;min-width:240px;pointer-events:none;
      box-shadow:0 0 25px rgba(125,92,255,.1),inset 0 0 40px rgba(125,92,255,.03),0 4px 20px rgba(0,0,0,.5);
      backdrop-filter:blur(12px);
    }

    /* ====== DEFCON INDICATOR (top-center) ====== */
    .defcon{
      position:fixed;top:10px;left:50%;transform:translateX(-50%);
      padding:6px 24px;border-radius:6px;
      font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;letter-spacing:4px;
      pointer-events:none;transition:all .3s;
      box-shadow:0 0 25px rgba(0,0,0,.5);
      text-shadow:0 0 10px currentColor;
    }

    /* ====== EVENT LOG (bottom-left) ====== */
    .log{
      position:fixed;bottom:70px;left:10px;
      padding:10px 14px;
      background:linear-gradient(135deg,rgba(4,7,20,.93),rgba(8,12,28,.9));
      border:1px solid rgba(0,217,255,.12);
      border-left:3px solid rgba(0,217,255,.5);
      border-radius:0 8px 8px 0;
      font-size:11px;max-width:400px;max-height:180px;overflow-y:auto;line-height:1.7;
      backdrop-filter:blur(10px);
      box-shadow:0 0 15px rgba(0,217,255,.06),0 2px 12px rgba(0,0,0,.4);
      scrollbar-width:thin;scrollbar-color:rgba(0,217,255,.25) transparent;
    }
    .log::-webkit-scrollbar{width:4px}
    .log::-webkit-scrollbar-thumb{background:rgba(0,217,255,.3);border-radius:2px}
    .log .g{color:#00ff9d}.log .r{color:#ff345d}.log .y{color:#ffb000}.log .c{color:#00d9ff}.log .p{color:#ff2bd6}

    /* ====== BUILD BAR (bottom-center) ====== */
    .build-bar{
      position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
      display:flex;gap:5px;pointer-events:auto;
      padding:8px 10px;
      background:linear-gradient(0deg,rgba(4,7,20,.94),rgba(10,14,30,.92));
      border:1px solid rgba(0,217,255,.18);
      border-radius:12px;
      box-shadow:0 -3px 25px rgba(0,217,255,.08),0 2px 15px rgba(0,0,0,.5);
      backdrop-filter:blur(12px);
    }
    .bb{
      padding:8px 14px;
      background:linear-gradient(180deg,rgba(15,20,40,.9),rgba(8,12,28,.95));
      border:1px solid rgba(0,217,255,.15);
      border-radius:8px;
      font-size:10px;text-align:center;min-width:86px;cursor:pointer;
      transition:all .2s ease;
      position:relative;overflow:hidden;
    }
    .bb::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,rgba(0,217,255,.3),transparent);
      opacity:0;transition:opacity .15s;
    }
    .bb:hover{
      border-color:#00d9ff;
      background:linear-gradient(180deg,rgba(0,217,255,.1),rgba(0,217,255,.05));
      box-shadow:0 0 20px rgba(0,217,255,.2),0 0 8px rgba(0,217,255,.1) inset;
      transform:translateY(-1px);
    }
    .bb:hover::before{opacity:1}
    .bb.active{
      border-color:#00d9ff;
      box-shadow:0 0 20px rgba(0,217,255,.35),0 0 15px rgba(0,217,255,.1) inset;
      background:linear-gradient(180deg,rgba(0,217,255,.12),rgba(0,217,255,.06));
    }
    .bb.active::before{opacity:1}
    .bb .k{font-weight:900;color:#00d9ff;font-size:14px;font-family:'Orbitron',sans-serif}
    .bb .n{color:#ccc;margin-top:2px;font-size:10px}
    .bb .c{color:#ffb000;font-size:9px;margin-top:1px}

    /* ====== ANIMATIONS ====== */
    @keyframes neonPulse{
      0%,100%{box-shadow:0 0 20px rgba(0,217,255,.1)}
      50%{box-shadow:0 0 35px rgba(0,217,255,.2)}
    }
    @keyframes intelPulse{
      0%,100%{box-shadow:0 0 15px rgba(125,92,255,.08)}
      50%{box-shadow:0 0 30px rgba(125,92,255,.18)}
    }
    @keyframes scanlineMove{
      0%{background-position:0 0}
      100%{background-position:0 4px}
    }
    .hud{animation:neonPulse 4s ease-in-out infinite}
    .intel{animation:intelPulse 5s ease-in-out infinite}
  </style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
  <div id="hud" class="hud"></div>
  <div id="intel" class="intel"></div>
  <div id="defcon" class="defcon"></div>
  <div id="log" class="log"></div>
  <div id="buildbar" class="build-bar"></div>
</div>

<script type="module" src="/src/geo/game.js"></script>
</body>
</html>
